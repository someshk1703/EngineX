      "Definition": `<h3>Two Pointers</h3>
<p>Two Pointers is a technique where you maintain two index variables (pointers) that traverse a data structure — typically an array or linked list — often in the same or opposite directions. Instead of using nested loops (O(n²)), a single pass with two pointers achieves O(n) by exploiting sorted order or structural properties.</p>
<p>Think of it like two people walking along a corridor: they can start from the same end and walk at different speeds, start from opposite ends and walk toward each other, or use one as a "scout" ahead of the other.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Opposite Ends (Converging)</h4>
<p>Two indices: <code>left = 0</code>, <code>right = n-1</code>. They advance inward based on a comparison. Works because the array is sorted — moving left increases the sum, moving right decreases it.</p>
<h4>Same Direction (Sliding)</h4>
<p><code>slow</code> and <code>fast</code> both start at 0 but advance at different rates. <code>fast</code> probes ahead; <code>slow</code> marks the write position. Used for in-place array mutations.</p>
<h4>Fast/Slow (Floyd's Cycle Detection)</h4>
<p>On a linked list: <code>slow</code> moves 1 step, <code>fast</code> moves 2 steps. If a cycle exists, fast laps slow inside the cycle. The meeting point's distance to cycle start equals head's distance to cycle start — this is the mathematical invariant that powers cycle entry detection.</p>
<p><strong>Why it works mathematically:</strong> Let F = distance from head to cycle start, C = cycle length, h = distance from cycle start to meeting point. When they meet: slow has traveled F+h steps. Fast has traveled 2(F+h). The extra distance fast traveled, F+h, must be divisible by C. Therefore F ≡ C−h (mod C), which means resetting slow to head and advancing both one step at a time leads them to meet at the cycle entry.</p>`,

<p><strong>Key insight:</strong> The gain over brute force comes from monotonicity — in a sorted array, moving one pointer invalidates one direction of search space, so you never need to revisit elements.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Two Sum II (sorted array, opposite ends) ──────────────────
public int[] twoSum(int[] numbers, int target) {
    int left = 0, right = numbers.length - 1;
    while (left < right) {
        int sum = numbers[left] + numbers[right];
        if (sum == target)  return new int[]{left+1, right+1};
        else if (sum < target) left++;   // need larger sum
        else                   right--;  // need smaller sum
    }
    return new int[]{-1, -1}; // never reached per problem guarantee
}

// ── 2. Remove Duplicates In-Place (same direction) ─────────────
public int removeDuplicates(int[] nums) {
    if (nums.length == 0) return 0;
    int slow = 1; // slow = next write position
    for (int fast = 1; fast < nums.length; fast++) {
        if (nums[fast] != nums[fast - 1]) {
            nums[slow++] = nums[fast]; // write unique element
        }
    }
    return slow;
}

// ── 3. Floyd's Cycle Detection ──────────────────────────────────
public boolean hasCycle(ListNode head) {
    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
        if (slow == fast) return true; // meeting point → cycle
    }
    return false;
}

// ── 4. Find Cycle Start (Floyd Part 2) ─────────────────────────
public ListNode detectCycle(ListNode head) {
    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
        if (slow == fast) {         // cycle detected
            slow = head;            // reset one pointer to head
            while (slow != fast) { // advance both by 1 until meet
                slow = slow.next;
                fast = fast.next;
            }
            return slow;            // cycle entry node
        }
    }
    return null;
}

// ── 5. Middle of Linked List ────────────────────────────────────
public ListNode middleNode(ListNode head) {
    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
    }
    return slow; // when fast is at end, slow is at middle
}</pre>`,

      "Worked Example": `<h3>Worked Example — Container With Most Water (LC 11)</h3>
<h4>Problem</h4>
<p>Given n vertical lines of heights <code>height[i]</code>, find two lines that together with x-axis form a container holding the most water.</p>
<h4>Brute Force — O(n²)</h4>
<pre>// Check every pair — TLE for n > 10^4
int maxWater = 0;
for (int i = 0; i < height.length; i++)
    for (int j = i+1; j < height.length; j++)
        maxWater = Math.max(maxWater,
            Math.min(height[i], height[j]) * (j - i));
return maxWater;</pre>
<h4>Optimal — Two Pointers O(n)</h4>
<pre>public int maxArea(int[] height) {
    int left = 0, right = height.length - 1, max = 0;
    while (left < right) {
        int water = Math.min(height[left], height[right]) * (right - left);
        max = Math.max(max, water);
        // Always move the SHORTER bar — moving the taller can only shrink width
        // without increasing the min height, so it can never improve the result.
        if (height[left] < height[right]) left++;
        else                               right--;
    }
    return max;
}</pre>
<h4>Why Two Pointers Applies</h4>
<p>The key insight: if we move the pointer at the taller bar inward, the width decreases AND the height is still bounded by the shorter bar — water can only decrease. So we must move the shorter bar. This greedy correctness argument makes opposite-ends two pointer optimal here.</p>`,

      "Definition": `<h3>Sliding Window</h3>
<p>Sliding Window is a technique to process contiguous subarrays (or substrings) efficiently by maintaining a "window" — a range [left, right] — and sliding it across the input. Instead of recomputing from scratch for every subarray, you add the new right element and remove the old left element, maintaining running state.</p>
<p>Think of it as a camera frame sliding across a film strip: you see exactly k frames at once, and as you advance, one old frame leaves and one new frame enters.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Fixed Size Window</h4>
<p>Window size k is constant. right advances until window size = k. Then: process window, remove arr[left], left++. State is maintained incrementally — no need to recompute sum/max each time.</p>
<h4>Variable Size Window (Expand-Contract)</h4>
<p>right always advances (expand). When window violates a constraint → contract by moving left rightward until constraint is satisfied again. The window size varies dynamically. Track max/min window size seen.</p>
<h4>Frequency Map Variant</h4>
<p>Use a HashMap or int[] array to count character frequencies in the window. When a character's count hits a threshold or the window has too many distinct characters → contract. This is the engine behind "minimum window substring" and "longest substring without repeating characters".</p>
<p><strong>Key invariant:</strong> In expand-contract, left ≤ right always, and the window always satisfies the constraint AFTER contraction. This ensures you never miss a valid state.</p>`,

<tr><td>Variable window</td><td>O(n)</td><td>O(1)</td><td>left and right each move forward at most n times total — amortized O(1) per step</td></tr>
<tr><td>Frequency map window</td><td>O(n)</td><td>O(k) where k = alphabet size</td><td>Same amortized argument; map has at most k entries</td></tr>

<p><strong>Critical insight:</strong> The amortized O(n) for variable windows comes from the fact that each pointer is monotonically non-decreasing — left and right never go backward. So total operations = 2n at most.</p>`,

<h4>2. Variable Size — Find Longest</h4>
<p>Expand right as far as possible while constraint holds. If violated, shrink from left. Track max length seen. Example: Longest Substring Without Repeating Characters.</p>
<h4>3. Variable Size — Find Shortest</h4>
<p>Expand right until constraint is satisfied. Then shrink from left while still satisfied, tracking minimum length. Example: Minimum Size Subarray Sum.</p>
<h4>4. Frequency Map (Anagram/Permutation)</h4>
<p>Fixed window on string, maintain char count array. Compare window counts to target counts in O(26) = O(1). Example: Find All Anagrams in a String.</p>
<h4>5. At Most K Distinct (Template)</h4>
<p>"Exactly K" problems convert to: f(exactly K) = f(at most K) - f(at most K-1). Powerful meta-trick.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Fixed Window — Max Sum of Size K ────────────────────────
public int maxSumSubarray(int[] nums, int k) {
    int windowSum = 0, maxSum = 0;
    for (int i = 0; i < k; i++) windowSum += nums[i]; // initial window
    maxSum = windowSum;
    for (int right = k; right < nums.length; right++) {
        windowSum += nums[right] - nums[right - k]; // slide: add right, drop left
        maxSum = Math.max(maxSum, windowSum);
    }
    return maxSum;
}

// ── 2. Variable Window — Longest Substring No Repeating ────────
public int lengthOfLongestSubstring(String s) {
    Map&lt;Character, Integer&gt; map = new HashMap&lt;&gt;(); // char → last seen index
    int max = 0;
    for (int left = 0, right = 0; right < s.length(); right++) {
        char c = s.charAt(right);
        if (map.containsKey(c)) {
            // jump left past the last occurrence of c
            left = Math.max(left, map.get(c) + 1);
        }
        map.put(c, right);
        max = Math.max(max, right - left + 1);
    }
    return max;
}

// ── 3. Minimum Window Substring ─────────────────────────────────
public String minWindow(String s, String t) {
    int[] need = new int[128], have = new int[128];
    for (char c : t.toCharArray()) need[c]++;
    int formed = 0, required = (int) t.chars().distinct().count();
    int left = 0, minLen = Integer.MAX_VALUE, minL = 0;
    for (int right = 0; right < s.length(); right++) {
        char c = s.charAt(right);
        have[c]++;
        if (need[c] > 0 && have[c] == need[c]) formed++; // just satisfied c
        while (formed == required) { // valid window → try to shrink
            if (right - left + 1 < minLen) { minLen = right-left+1; minL = left; }
            char lc = s.charAt(left++);
            if (need[lc] > 0 && have[lc]-- == need[lc]) formed--; // lost c
        }
    }
    return minLen == Integer.MAX_VALUE ? "" : s.substring(minL, minL + minLen);
}

// ── 4. Find All Anagrams (Fixed Window + Freq Array) ───────────
public List&lt;Integer&gt; findAnagrams(String s, String p) {
    List&lt;Integer&gt; res = new ArrayList&lt;&gt;();
    if (s.length() < p.length()) return res;
    int[] pCount = new int[26], wCount = new int[26];
    for (char c : p.toCharArray()) pCount[c-'a']++;
    for (int i = 0; i < p.length(); i++) wCount[s.charAt(i)-'a']++;
    if (Arrays.equals(pCount, wCount)) res.add(0);
    for (int i = p.length(); i < s.length(); i++) {
        wCount[s.charAt(i)-'a']++;
        wCount[s.charAt(i-p.length())-'a']--;
        if (Arrays.equals(pCount, wCount)) res.add(i - p.length() + 1);
    }
    return res;
}</pre>`,

      "Worked Example": `<h3>Worked Example — Longest Repeating Character Replacement (LC 424)</h3>
<h4>Problem</h4>
<p>Given string s and integer k, find the length of the longest substring you can get if you can replace at most k characters.</p>
<h4>Key Insight</h4>
<p>A window is valid if: <code>(windowSize - maxFreqInWindow) ≤ k</code>. The non-max-frequency characters are the ones we'd replace. We only need to track the maximum frequency seen, and we never shrink it (monotonic trick — we only care about LONGER windows).</p>
<h4>Brute Force — O(n² × 26)</h4>
<pre>// Try every substring, count frequencies — TLE
int max = 0;
for (int i = 0; i < s.length(); i++) {
    int[] freq = new int[26];
    int maxFreq = 0;
    for (int j = i; j < s.length(); j++) {
        maxFreq = Math.max(maxFreq, ++freq[s.charAt(j)-'a']);
        if ((j - i + 1) - maxFreq <= k) max = Math.max(max, j-i+1);
    }
}
return max;</pre>
<h4>Optimal — Sliding Window O(n)</h4>
<pre>public int characterReplacement(String s, int k) {
    int[] count = new int[26];
    int left = 0, maxFreq = 0, maxLen = 0;
    for (int right = 0; right < s.length(); right++) {
        maxFreq = Math.max(maxFreq, ++count[s.charAt(right) - 'A']);
        // If window is invalid (too many replacements needed), shrink
        while ((right - left + 1) - maxFreq > k) {
            count[s.charAt(left++) - 'A']--;
            // Note: maxFreq is NOT decremented — we only care about LONGER windows
        }
        maxLen = Math.max(maxLen, right - left + 1);
    }
    return maxLen;
}</pre>
<p><strong>Why not decrement maxFreq?</strong> We want the longest window. If shrinking doesn't produce a longer window, maxFreq stays — it's a monotonic optimisation valid because we only care about the global max.</p>`,

      "Definition": `<h3>Prefix Sum</h3>
<p>A prefix sum array (also called cumulative sum) is a precomputed array where <code>prefix[i]</code> = sum of all elements from index 0 to i-1. Once built, the sum of any subarray <code>[l, r]</code> can be computed in O(1) as <code>prefix[r+1] - prefix[l]</code>.</p>
<p>Think of it as a running odometer reading: if the odometer reads 50 at city A and 80 at city B, the distance between them is 30 — no need to retrace the route.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Building the Prefix Array</h4>
<p><code>prefix[0] = 0</code> (empty prefix). <code>prefix[i] = prefix[i-1] + nums[i-1]</code>. Array size is n+1 to avoid off-by-one issues — prefix[0]=0 makes range queries uniform.</p>
<h4>Range Query</h4>
<p><code>sum(l, r) = prefix[r+1] - prefix[l]</code>. This works because prefix[r+1] includes elements 0..r, and subtracting prefix[l] removes elements 0..l-1.</p>
<h4>Subarray Sum Equals K (HashMap trick)</h4>
<p>As you compute running sum, you want: does any previous prefix sum equal <code>currentSum - k</code>? Store prefix sums in a HashMap with their count. Initialize map with {0: 1} (empty prefix). At each index: check if <code>map.get(currentSum - k)</code> exists — if so, add its count to result. Then store currentSum in map.</p>
<h4>2D Prefix Sum</h4>
<p><code>prefix[i][j] = prefix[i-1][j] + prefix[i][j-1] - prefix[i-1][j-1] + grid[i-1][j-1]</code>. Inclusion-exclusion removes the double-counted top-left rectangle.</p>`,

<tr><td>Range sum query</td><td>O(1)</td><td>O(1)</td><td>Two array lookups and a subtraction</td></tr>
<tr><td>Subarray sum = K</td><td>O(n)</td><td>O(n)</td><td>Single pass, HashMap stores at most n prefix sums</td></tr>

<p><strong>Trade-off:</strong> Prefix sum trades O(n) space for O(1) query time. If you have many queries (Q >> 1), total time drops from O(Q×n) to O(n + Q). Worth it when Q ≥ 2.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Static Prefix Sum + Range Query ─────────────────────────
class NumArray {
    private int[] prefix;
    public NumArray(int[] nums) {
        prefix = new int[nums.length + 1];
        for (int i = 0; i < nums.length; i++)
            prefix[i + 1] = prefix[i] + nums[i];
    }
    // sum of nums[left..right] inclusive
    public int sumRange(int left, int right) {
        return prefix[right + 1] - prefix[left];
    }
}

// ── 2. Subarray Sum Equals K (count) ────────────────────────────
public int subarraySum(int[] nums, int k) {
    Map&lt;Integer, Integer&gt; map = new HashMap&lt;&gt;();
    map.put(0, 1); // empty prefix has sum 0
    int sum = 0, count = 0;
    for (int num : nums) {
        sum += num;
        // if (sum - k) was a previous prefix sum, those subarrays sum to k
        count += map.getOrDefault(sum - k, 0);
        map.put(sum, map.getOrDefault(sum, 0) + 1);
    }
    return count;
}

// ── 3. 2D Prefix Sum ─────────────────────────────────────────────
class NumMatrix {
    private int[][] prefix;
    public NumMatrix(int[][] matrix) {
        int m = matrix.length, n = matrix[0].length;
        prefix = new int[m + 1][n + 1];
        for (int i = 1; i <= m; i++)
            for (int j = 1; j <= n; j++)
                prefix[i][j] = prefix[i-1][j] + prefix[i][j-1]
                              - prefix[i-1][j-1] + matrix[i-1][j-1];
    }
    public int sumRegion(int r1, int c1, int r2, int c2) {
        return prefix[r2+1][c2+1] - prefix[r1][c2+1]
             - prefix[r2+1][c1]   + prefix[r1][c1];
    }
}

// ── 4. Difference Array (range updates) ─────────────────────────
public int[] applyRangeUpdates(int n, int[][] updates) {
    int[] diff = new int[n + 1];
    for (int[] u : updates) {  // u = [left, right, val]
        diff[u[0]] += u[2];
        diff[u[1] + 1] -= u[2]; // cancel after range
    }
    int[] result = new int[n];
    int running = 0;
    for (int i = 0; i < n; i++) {
        running += diff[i];
        result[i] = running;
    }
    return result;
}</pre>`,

<h4>Problem</h4>
<p>Given integer array nums and integer k, return the total number of subarrays whose sum equals k. Array can contain negative numbers.</p>
<h4>Why Sliding Window FAILS</h4>
<p>Negative numbers break the monotonicity assumption. Expanding the window doesn't guarantee increasing the sum, so we can't contract greedily. We need prefix sums.</p>
<h4>Brute Force — O(n²)</h4>
<pre>int count = 0;
for (int i = 0; i < nums.length; i++) {
    int sum = 0;
    for (int j = i; j < nums.length; j++) {
        sum += nums[j];
        if (sum == k) count++;
    }
}
return count;</pre>
<h4>Optimal — Prefix Sum + HashMap O(n)</h4>
<pre>public int subarraySum(int[] nums, int k) {
    Map&lt;Integer, Integer&gt; prefixCount = new HashMap&lt;&gt;();
    prefixCount.put(0, 1); // base case: empty prefix, sum=0
    int runningSum = 0, count = 0;
    for (int num : nums) {
        runningSum += num;
        // sum[l..r] = runningSum - prefix[l] = k
        // ⟹ prefix[l] = runningSum - k
        // Ask: how many times have we seen (runningSum - k) as a prefix sum?
        count += prefixCount.getOrDefault(runningSum - k, 0);
        prefixCount.merge(runningSum, 1, Integer::sum);
    }
    return count;
}

      "Definition": `<h3>Binary Search</h3>
<p>Binary Search is a divide-and-conquer algorithm that finds a target in a SORTED (or monotonically ordered) search space by repeatedly halving the space. In each step, compare the midpoint to the target: if equal, done; if target is smaller, search left half; if larger, search right half.</p>
<p>The key insight: you can eliminate half the search space in each step because monotonicity guarantees that the target can only be in one half. This generalises far beyond sorted arrays — any search space where you can say "left half is definitely wrong" or "right half is definitely wrong" can use binary search.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Mid-Point Calculation</h4>
<p>Never write <code>mid = (left + right) / 2</code> — integer overflow when left+right exceeds INT_MAX. Always use: <code>mid = left + (right - left) / 2</code>.</p>
<h4>Invariant Maintenance</h4>
<p>The search space must be [left, right] inclusive. The loop continues while <code>left ≤ right</code> (for exact match) or <code>left < right</code> (for boundary finding). The wrong termination condition is a very common bug.</p>
<h4>Boundary Finding Template</h4>
<p>To find the leftmost position where condition is true: maintain <code>ans = -1</code>. When condition holds: save mid as candidate, search left (right = mid-1). When condition fails: search right (left = mid+1).</p>
<h4>Rotated Array</h4>
<p>One half is always sorted. Determine which half: if nums[mid] >= nums[left], left half is sorted. Check if target is in the sorted half — if yes, binary search there; otherwise, search the other half.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Classic Binary Search ────────────────────────────────────
public int search(int[] nums, int target) {
    int left = 0, right = nums.length - 1;
    while (left <= right) {
        int mid = left + (right - left) / 2; // safe mid, avoids overflow
        if (nums[mid] == target)   return mid;
        else if (nums[mid] < target) left = mid + 1;
        else                         right = mid - 1;
    }
    return -1;
}

// ── 2. Leftmost Position (First Occurrence / Lower Bound) ───────
public int lowerBound(int[] nums, int target) {
    int left = 0, right = nums.length - 1, ans = -1;
    while (left <= right) {
        int mid = left + (right - left) / 2;
        if (nums[mid] == target) { ans = mid; right = mid - 1; } // go left for more
        else if (nums[mid] < target) left = mid + 1;
        else                          right = mid - 1;
    }
    return ans;
}

// ── 3. Search in Rotated Sorted Array ───────────────────────────
public int searchRotated(int[] nums, int target) {
    int left = 0, right = nums.length - 1;
    while (left <= right) {
        int mid = left + (right - left) / 2;
        if (nums[mid] == target) return mid;
        if (nums[left] <= nums[mid]) { // left half is sorted
            if (nums[left] <= target && target < nums[mid])
                right = mid - 1; // target in sorted left half
            else left = mid + 1;
        } else { // right half is sorted
            if (nums[mid] < target && target <= nums[right])
                left = mid + 1; // target in sorted right half
            else right = mid - 1;
        }
    }
    return -1;
}

// ── 4. Binary Search on Answer Space ───────────────────────────
// Template: find minimum capacity to ship packages in D days
public int shipWithinDays(int[] weights, int days) {
    int lo = 0, hi = 0;
    for (int w : weights) { lo = Math.max(lo, w); hi += w; }
    // lo = max single weight (minimum possible), hi = sum (one day)
    while (lo < hi) {
        int mid = lo + (hi - lo) / 2;
        if (canShip(weights, days, mid)) hi = mid;   // try smaller
        else                              lo = mid + 1; // need more
    }
    return lo;
}
private boolean canShip(int[] w, int days, int cap) {
    int d = 1, cur = 0;
    for (int x : w) { if (cur + x > cap) { d++; cur = 0; } cur += x; }
    return d <= days;
}</pre>`,

      "Worked Example": `<h3>Worked Example — Koko Eating Bananas (LC 875)</h3>
<h4>Problem</h4>
<p>Koko can eat k bananas per hour. Given piles[] and hours h, find minimum k such that all bananas can be eaten in h hours.</p>
<h4>Why Binary Search on Answer?</h4>
<p>If speed k is feasible, then k+1 is also feasible (monotonic). If k is not feasible, k-1 is also not feasible. This monotonicity on the answer space means binary search works perfectly.</p>
<h4>Answer Space</h4>
<p>lo = 1 (minimum meaningful speed), hi = max(piles) (eat largest pile in 1 hour — no need to go faster).</p>
<h4>Solution</h4>
<pre>public int minEatingSpeed(int[] piles, int h) {
    int lo = 1, hi = 0;
    for (int p : piles) hi = Math.max(hi, p);
    while (lo < hi) {
        int mid = lo + (hi - lo) / 2;
        if (canFinish(piles, h, mid)) hi = mid;   // mid works, try smaller
        else                           lo = mid + 1; // too slow, need faster
    }
    return lo;
}
private boolean canFinish(int[] piles, int h, int speed) {
    int hours = 0;
    for (int p : piles)
        hours += (p + speed - 1) / speed; // ceil(p/speed)
    return hours <= h;
}
// Time: O(n log(max_pile)). Why? log(max_pile) binary search iterations,
// each costing O(n) feasibility check. n ≤ 10^4, max_pile ≤ 10^9 → 30 iterations.</pre>
<h4>Key Pattern Recognition</h4>
<p>Phrases "minimum k" + "feasible in D operations" + monotonic feasibility → binary search on answer space. The feasibility function does the actual work; binary search just finds the boundary.</p>`,

    sections: {
      "Definition": `<h3>Merge Intervals</h3>
<p>The Merge Intervals pattern handles problems involving ranges or time windows — merging overlapping intervals, inserting a new interval, finding gaps, or counting overlaps. The core idea: sort intervals by start time, then greedily decide whether to merge based on whether the current interval overlaps with the last merged one.</p>
<p>Two intervals [a,b] and [c,d] overlap if and only if <code>c ≤ b</code> (when sorted by start). If they overlap, the merged interval is <code>[a, max(b, d)]</code>.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Sorting</h4>
<p>Sort intervals by start time: <code>Arrays.sort(intervals, (a,b) -> a[0] - b[0])</code>. This guarantees that we only need to check if the current interval overlaps with the LAST merged interval (not any previous one).</p>
<h4>Overlap Condition</h4>
<p>After sorting, intervals[i][0] ≥ intervals[i-1][0] always. Overlap occurs when: <code>intervals[i][0] ≤ lastMerged[1]</code> (current start ≤ previous end). If overlapping, extend the end: <code>lastMerged[1] = max(lastMerged[1], intervals[i][1])</code>.</p>
<h4>Insert Interval</h4>
<p>Three-phase approach: (1) add all intervals that end before new interval starts, (2) merge all intervals that overlap with new interval into one, (3) add all remaining intervals. No sorting needed if original is sorted.</p>
<h4>Greedy Correctness</h4>
<p>After sorting by start, the greedy decision (merge if overlap, else start new group) is optimal because any interval that could overlap with the current one must have a start ≤ current end, and we've processed all such intervals already.</p>`,

      "Time & Space Complexity": `<h3>Time & Space Complexity</h3>

<tr><th>Operation</th><th>Time</th><th>Space</th><th>Why</th></tr>
<tr><td>Merge intervals</td><td>O(n log n)</td><td>O(n)</td><td>Sort dominates: O(n log n). Merge pass is O(n). Output is O(n) in worst case</td></tr>
<tr><td>Insert interval (sorted input)</td><td>O(n)</td><td>O(n)</td><td>No sort needed; single pass through all intervals</td></tr>
<tr><td>Count overlapping intervals</td><td>O(n log n)</td><td>O(n)</td><td>Sort events, sweep — equivalent to merge but counts instead</td></tr>
<tr><td>Meeting rooms II (min rooms)</td><td>O(n log n)</td><td>O(n)</td><td>Sort starts+ends separately, two-pointer sweep</td></tr>
</table>
<p><strong>Why does sorting save us?</strong> Without sorting, checking if interval i overlaps with any previous interval requires O(n) work per interval → O(n²) total. Sorting reduces this to O(1) per interval — only check against the last merged.</p>`,

      "Subtypes & Variants": `<h3>Subtypes & Variants</h3>

<h4>2. Insert Interval</h4>
<p>Given sorted non-overlapping intervals, insert new interval and merge. Three-phase: before, overlap, after.</p>
<h4>3. Non-overlapping Intervals (Minimum Removal)</h4>
<p>Greedily keep intervals that end earliest (sort by end time). Count how many you must remove for no overlaps. This is the interval scheduling maximization problem.</p>

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Merge Intervals ──────────────────────────────────────────
public int[][] merge(int[][] intervals) {
    Arrays.sort(intervals, (a, b) -> a[0] - b[0]); // sort by start
    List&lt;int[]&gt; merged = new ArrayList&lt;&gt;();
    for (int[] interval : intervals) {
        if (merged.isEmpty() || merged.get(merged.size()-1)[1] < interval[0]) {
            merged.add(interval); // no overlap, add new
        } else {
            // overlap: extend the end of last merged interval
            merged.get(merged.size()-1)[1] =
                Math.max(merged.get(merged.size()-1)[1], interval[1]);
        }
    }
    return merged.toArray(new int[0][]);
}

// ── 2. Insert Interval ──────────────────────────────────────────
public int[][] insert(int[][] intervals, int[] newInterval) {
    List&lt;int[]&gt; res = new ArrayList&lt;&gt;();
    int i = 0, n = intervals.length;
    // Phase 1: add all intervals that end before newInterval starts
    while (i < n && intervals[i][1] < newInterval[0]) res.add(intervals[i++]);
    // Phase 2: merge all overlapping with newInterval
    while (i < n && intervals[i][0] <= newInterval[1]) {
        newInterval[0] = Math.min(newInterval[0], intervals[i][0]);
        newInterval[1] = Math.max(newInterval[1], intervals[i][1]);
        i++;
    }
    res.add(newInterval);
    // Phase 3: add remaining
    while (i < n) res.add(intervals[i++]);
    return res.toArray(new int[0][]);
}

// ── 3. Meeting Rooms II (Min Rooms) ─────────────────────────────
public int minMeetingRooms(int[][] intervals) {
    int n = intervals.length;
    int[] starts = new int[n], ends = new int[n];
    for (int i = 0; i < n; i++) { starts[i]=intervals[i][0]; ends[i]=intervals[i][1]; }
    Arrays.sort(starts); Arrays.sort(ends);
    int rooms = 0, maxRooms = 0, e = 0;
    for (int s = 0; s < n; s++) {
        if (starts[s] < ends[e]) rooms++; // meeting started before any ended
        else                       e++;   // a meeting ended, reuse room
        maxRooms = Math.max(maxRooms, rooms);
    }
    return maxRooms;
}

// ── 4. Non-overlapping Intervals (Min Removal) ──────────────────
public int eraseOverlapIntervals(int[][] intervals) {
    Arrays.sort(intervals, (a, b) -> a[1] - b[1]); // sort by END
    int kept = 1, lastEnd = intervals[0][1];
    for (int i = 1; i < intervals.length; i++) {
        if (intervals[i][0] >= lastEnd) { // no overlap with last kept
            kept++;
            lastEnd = intervals[i][1];
        } // else: overlaps, skip (count as removed)
    }
    return intervals.length - kept;
}</pre>`,

      "Worked Example": `<h3>Worked Example — Merge Intervals (LC 56)</h3>
<h4>Problem</h4>
<p>Given array of intervals, merge all overlapping intervals and return non-overlapping result.</p>
<h4>Why Sorting Enables Greedy</h4>
<p>After sorting by start time, two intervals can only be adjacent in overlap — if interval[i] doesn't overlap with interval[i-1], it can't overlap with any earlier interval (since they have even smaller start times). So we only ever need to look at the LAST merged interval.</p>
<h4>Trace</h4>
<pre>Input: [[1,3],[2,6],[8,10],[15,18]]
After sort by start: [[1,3],[2,6],[8,10],[15,18]]

Process [1,3]: result = [[1,3]]
Process [2,6]: 2 <= 3 (overlap!) → merge: [1, max(3,6)] = [1,6]
              result = [[1,6]]
Process [8,10]: 8 > 6 (no overlap) → add: result = [[1,6],[8,10]]
Process [15,18]: 15 > 10 (no overlap) → add: result = [[1,6],[8,10],[15,18]]

Output: [[1,6],[8,10],[15,18]] ✓</pre>
<h4>Edge Cases</h4>
<ul><li>Single interval → return as is</li><li>All overlapping → return one merged interval</li><li>No overlapping → return input as is</li><li>Contained interval (e.g., [1,10] then [2,5]): max end handles it — [1, max(10,5)] = [1,10]</li></ul>`,

      "Definition": `<h3>Cyclic Sort</h3>
<p>Cyclic Sort is an in-place sorting algorithm optimised for arrays containing numbers in a known range (typically [1, n] or [0, n-1]). It places each number at its correct index (number i goes to index i-1 for 1-indexed) by repeatedly swapping until the current element is in the right position.</p>
<p>After sorting, any number not at its expected index reveals a missing or duplicate number. It's the only O(n) sort that doesn't need extra space when the domain is known.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Invariant</h4>
<p>For an array containing values in [1, n]: element with value v belongs at index v-1. Cyclic sort maintains: "place the current element at its correct index by swapping".</p>
<h4>Algorithm</h4>
<p>i = 0. While i < n: let j = nums[i] - 1 (correct index for nums[i]). If nums[i] != nums[j]: swap(nums[i], nums[j]) — don't advance i, the swapped-in element may also be wrong. If nums[i] == nums[j]: advance i++ (either correctly placed, or duplicate at its correct slot).</p>
<h4>Why Cyclic?</h4>
<p>Each swap places at least one element in its correct position. Total swaps ≤ n (each element moves to its correct index at most once). This guarantees O(n) time even though there's a nested while loop — amortized analysis.</p>
<h4>Finding Anomalies</h4>
<p>After cyclic sort: scan array. If nums[i] != i+1, then i+1 is missing and nums[i] is a duplicate.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── Core Cyclic Sort ────────────────────────────────────────────
private void cyclicSort(int[] nums) {
    int i = 0;
    while (i < nums.length) {
        int j = nums[i] - 1; // correct index for nums[i]
        if (nums[i] != nums[j]) // not in correct place AND not a duplicate
            swap(nums, i, j);   // place nums[i] at index j
        else
            i++;  // either correctly placed, or duplicate (avoid infinite loop)
    }
}
private void swap(int[] nums, int i, int j) {
    int t = nums[i]; nums[i] = nums[j]; nums[j] = t;
}

// ── 1. Find Missing Number [0, n] ───────────────────────────────
public int missingNumber(int[] nums) {
    int i = 0, n = nums.length;
    while (i < n) {
        int j = nums[i]; // 0-indexed: value nums[i] belongs at index nums[i]
        if (nums[i] < n && nums[i] != nums[j]) swap(nums, i, j);
        else i++;
    }
    for (i = 0; i < n; i++)
        if (nums[i] != i) return i; // i is missing
    return n; // n is missing
}

// ── 2. Find All Missing Numbers ─────────────────────────────────
public List&lt;Integer&gt; findDisappearedNumbers(int[] nums) {
    cyclicSort(nums); // place each number at its correct index
    List&lt;Integer&gt; missing = new ArrayList&lt;&gt;();
    for (int i = 0; i < nums.length; i++)
        if (nums[i] != i + 1) missing.add(i + 1);
    return missing;
}

// ── 3. Find Duplicate + Missing (Corrupt Pair) ──────────────────
public int[] findErrorNums(int[] nums) {
    cyclicSort(nums);
    for (int i = 0; i < nums.length; i++)
        if (nums[i] != i + 1)
            return new int[]{nums[i], i + 1}; // {duplicate, missing}
    return new int[]{-1, -1};
}

// ── 4. First Missing Positive ────────────────────────────────────
public int firstMissingPositive(int[] nums) {
    int i = 0, n = nums.length;
    while (i < n) {
        int j = nums[i] - 1;
        // Only sort if value in valid range [1,n] and not already correct
        if (nums[i] > 0 && nums[i] <= n && nums[i] != nums[j])
            swap(nums, i, j);
        else i++;
    }
    for (i = 0; i < n; i++)
        if (nums[i] != i + 1) return i + 1;
    return n + 1; // all positions 1..n filled, answer is n+1
}</pre>`,

    sections: {
      "Definition": `<h3>Monotonic Stack</h3>
<p>A Monotonic Stack is a stack where elements are maintained in strictly increasing or decreasing order (from bottom to top). As you process each element, you pop elements from the stack that violate the monotonic property — and that "popping moment" is exactly when you can compute useful information about the relationship between elements.</p>
<p>Think of it as a stack of telescopes pointed at a skyline: a taller building blocks shorter ones behind it. When a taller building appears, you "resolve" all shorter buildings it blocks.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Monotonic Decreasing Stack (Next Greater Element)</h4>
<p>Process left to right. Maintain stack in decreasing order (top is smallest). For each element x: while stack is not empty AND stack.top() < x → pop. The popped element's "next greater" is x. Then push x. Any element remaining at the end has no next greater element (assign -1 or 0).</p>
<h4>Monotonic Increasing Stack (Next Smaller Element)</h4>
<p>Same logic but inverse. Pop when stack.top() > x. Popped element's next smaller is x.</p>
<h4>Why Popping = Computing</h4>
<p>The moment we pop element y because of incoming x: x is the FIRST element to the right of y that is greater than y (in a decreasing stack). This "first greater to the right" relationship is computed at exactly the right moment — not before, not after.</p>
<h4>Largest Rectangle (Area Calculation on Pop)</h4>
<p>Stack stores indices, not values. When we pop index i, the height is heights[i]. The width is: right boundary (current index j) - left boundary (new top after pop) - 1. Area = heights[i] × width. This uses the stack to efficiently find the "left smaller" and "right smaller" boundaries.</p>`,

<tr><td>Largest Rectangle</td><td>O(n)</td><td>O(n)</td><td>Same amortized argument; sentinel 0 at end flushes remaining stack</td></tr>
<tr><td>Maximal Rectangle (2D)</td><td>O(m×n)</td><td>O(n)</td><td>Build histogram per row (O(n)), run largest-rectangle on it (O(n)), repeat m rows</td></tr>

<p><strong>Amortized O(n) argument:</strong> Total pushes = n. Total pops ≤ n (each element popped at most once). So total operations = 2n → O(n). This is the same argument as the two-pointer amortized analysis.</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Next Greater Element I ────────────────────────────────────
public int[] nextGreaterElement(int[] nums1, int[] nums2) {
    Map&lt;Integer, Integer&gt; nge = new HashMap&lt;&gt;(); // value → next greater
    Deque&lt;Integer&gt; stack = new ArrayDeque&lt;&gt;(); // monotonic decreasing
    for (int x : nums2) {
        while (!stack.isEmpty() && stack.peek() < x)
            nge.put(stack.pop(), x); // x is next greater for popped element
        stack.push(x);
    }
    while (!stack.isEmpty()) nge.put(stack.pop(), -1); // no next greater
    int[] result = new int[nums1.length];
    for (int i = 0; i < nums1.length; i++) result[i] = nge.get(nums1[i]);
    return result;
}

// ── 2. Daily Temperatures ────────────────────────────────────────
public int[] dailyTemperatures(int[] temps) {
    int[] ans = new int[temps.length];
    Deque&lt;Integer&gt; stack = new ArrayDeque&lt;&gt;(); // stores indices (decreasing temps)
    for (int i = 0; i < temps.length; i++) {
        while (!stack.isEmpty() && temps[stack.peek()] < temps[i]) {
            int idx = stack.pop();
            ans[idx] = i - idx; // days to wait = current - popped index
        }
        stack.push(i);
    }
    return ans; // remaining indices in stack: ans[i] = 0 (no warmer day)
}

// ── 3. Largest Rectangle in Histogram ───────────────────────────
public int largestRectangleArea(int[] heights) {
    Deque&lt;Integer&gt; stack = new ArrayDeque&lt;&gt;(); // increasing stack of indices
    int maxArea = 0;
    for (int i = 0; i <= heights.length; i++) {
        int h = (i == heights.length) ? 0 : heights[i]; // sentinel 0 at end
        while (!stack.isEmpty() && heights[stack.peek()] > h) {
            int height = heights[stack.pop()];
            int width = stack.isEmpty() ? i : i - stack.peek() - 1;
            // width: from left boundary (stack.peek()+1) to right boundary (i-1)
            maxArea = Math.max(maxArea, height * width);
        }
        stack.push(i);
    }
    return maxArea;
}

// ── 4. Maximal Rectangle (Binary Matrix) ────────────────────────
public int maximalRectangle(char[][] matrix) {
    if (matrix.length == 0) return 0;
    int[] heights = new int[matrix[0].length];
    int maxRect = 0;
    for (char[] row : matrix) {
        for (int j = 0; j < row.length; j++)
            heights[j] = row[j] == '1' ? heights[j] + 1 : 0;
        maxRect = Math.max(maxRect, largestRectangleArea(heights));
    }

    sections: {
      "Definition": `<h3>Monotonic Deque</h3>
<p>A Monotonic Deque (double-ended queue) extends the monotonic stack by allowing efficient removal from BOTH ends. The key use case: sliding window maximum/minimum. The deque maintains indices of "candidate" maximum (or minimum) elements in the current window — in decreasing (or increasing) order.</p>
<p>As the window slides right: add the new element to the back (removing smaller/larger elements that can never be the max), remove from the front if the front element is outside the current window.</p>`,

      "Internal Mechanics": `<h3>Internal Mechanics</h3>
<h4>Structure</h4>
<p>Use <code>Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;()</code> storing INDICES (not values). The front (peekFirst) always holds the index of the current window's maximum.</p>
<h4>Adding New Element (Back Operation)</h4>
<p>Before pushing index i: pop all indices j from the back where nums[j] ≤ nums[i] (for max deque). Why? If nums[j] ≤ nums[i] and j < i, then j will leave the window before i, and when it does, nums[i] ≥ nums[j] — so j can NEVER be the window maximum again. It's redundant.</p>
<h4>Expiring Old Elements (Front Operation)</h4>
<p>Before querying the front: if deque.peekFirst() ≤ i - k (front index is outside the window), pop from front. This maintains the window boundary.</p>
<h4>Query</h4>
<p>After both operations, deque.peekFirst() is the index of the current window's maximum. nums[deque.peekFirst()] is the answer.</p>`,

      "Time & Space Complexity": `<h3>Time & Space Complexity</h3>
<table class="complexity-table">
<tr><th>Operation</th><th>Time</th><th>Space</th><th>Why</th></tr>
<tr><td>Sliding window max (deque)</td><td>O(n)</td><td>O(k)</td><td>Each index pushed/popped from deque at most once — amortized O(1) per element</td></tr>
<tr><td>Sliding window max (naive)</td><td>O(n×k)</td><td>O(1)</td><td>Scan entire window for max at each position — too slow for large k</td></tr>
<tr><td>Sliding window max (heap)</td><td>O(n log k)</td><td>O(k)</td><td>Heap operations cost O(log k) each; requires lazy deletion</td></tr>
<tr><td>Sliding window min</td><td>O(n)</td><td>O(k)</td><td>Same as max, just maintain increasing deque instead</td></tr>
</table>
<p><strong>Why deque beats heap:</strong> A max-heap gives O(log k) per operation. The deque gives O(1) amortized by discarding elements that can never be the answer — a stronger pruning. For k close to n, the speedup is O(log n) × n = O(n log n) → O(n).</p>`,

      "Java Implementation": `<h3>Java Implementation</h3>
<pre>// ── 1. Sliding Window Maximum ────────────────────────────────────
public int[] maxSlidingWindow(int[] nums, int k) {
    int n = nums.length;
    int[] result = new int[n - k + 1];
    Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;(); // stores indices, decreasing values
    for (int i = 0; i < n; i++) {
        // Step 1: Remove indices outside window from FRONT
        while (!deque.isEmpty() && deque.peekFirst() <= i - k)
            deque.pollFirst();
        // Step 2: Remove smaller elements from BACK (they can never be max)
        while (!deque.isEmpty() && nums[deque.peekLast()] <= nums[i])
            deque.pollLast();
        deque.offerLast(i);
        // Step 3: Record result once window has k elements
        if (i >= k - 1)
            result[i - k + 1] = nums[deque.peekFirst()];
    }
    return result;
}

// ── 2. Sliding Window Minimum (Same structure, different comparison) ─
public int[] minSlidingWindow(int[] nums, int k) {
    int n = nums.length;
    int[] result = new int[n - k + 1];
    Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;(); // stores indices, INCREASING values
    for (int i = 0; i < n; i++) {
        while (!deque.isEmpty() && deque.peekFirst() <= i - k)
            deque.pollFirst();
        while (!deque.isEmpty() && nums[deque.peekLast()] >= nums[i]) // ≥ for min
            deque.pollLast();
        deque.offerLast(i);
        if (i >= k - 1)
            result[i - k + 1] = nums[deque.peekFirst()];
    }
    return result;
}

// ── 3. Jump Game VI — DP + Monotonic Deque ──────────────────────
public int maxResult(int[] nums, int k) {
    int n = nums.length;
    int[] dp = new int[n];
    dp[0] = nums[0];
    Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();
    deque.offerLast(0);
    for (int i = 1; i < n; i++) {
        // Remove expired indices (outside jump range)
        while (!deque.isEmpty() && deque.peekFirst() < i - k)
            deque.pollFirst();
        // Best previous position is at front
        dp[i] = nums[i] + dp[deque.peekFirst()];
        // Maintain decreasing deque of dp values
        while (!deque.isEmpty() && dp[deque.peekLast()] <= dp[i])
            deque.pollLast();
        deque.offerLast(i);
    }
    return dp[n - 1];
}

// ── 4. Shortest Subarray with Sum ≥ K ──────────────────────────
public int shortestSubarray(int[] nums, int k) {
    int n = nums.length;
    long[] prefix = new long[n + 1]; // prefix sums (long to avoid overflow)
    for (int i = 0; i < n; i++) prefix[i+1] = prefix[i] + nums[i];
    Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;(); // increasing prefix sums
    int minLen = Integer.MAX_VALUE;
    for (int r = 0; r <= n; r++) {
        // Check if front gives a valid subarray with sum ≥ k
        while (!deque.isEmpty() && prefix[r] - prefix[deque.peekFirst()] >= k)
            minLen = Math.min(minLen, r - deque.pollFirst());
        // Maintain increasing deque
        while (!deque.isEmpty() && prefix[deque.peekLast()] >= prefix[r])
            deque.pollLast();
        deque.offerLast(r);
    }
    return minLen == Integer.MAX_VALUE ? -1 : minLen;
}</pre>`,
