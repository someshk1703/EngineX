let currentDS = DS[0];
let currentTab = 'methods';
let currentCat = 'all';

function filterDS(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.replace('structures','').trim() === (cat==='all'?'All structures':cat) || (cat==='all'&&t.textContent.includes('All'))));
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('ds-grid');
  const visible = currentCat === 'all' ? DS : DS.filter(d => d.cat === currentCat);
  grid.innerHTML = visible.map(ds => `
    <div class="ds-card ${ds.id === currentDS.id ? 'active' : ''}" onclick="selectDS('${ds.id}')">
      <div class="emoji">${ds.emoji}</div>
      <div class="name">${ds.name}</div>
      <div class="tagline">${ds.tagline}</div>
      <div class="badge badge-${ds.difficulty}">${ds.difficulty === 'easy' ? 'Foundation' : ds.difficulty === 'med' ? 'Core skill' : 'Advanced'}</div>
    </div>
  `).join('');
}

function selectDS(id) {
  currentDS = DS.find(d => d.id === id);
  currentTab = 'methods';
  renderGrid();
  renderDetail();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
}

      <button class="nav-tab ${currentTab==='methods'?'active':''}" data-tab="methods" onclick="switchTab('methods')">Methods & tricks</button>
      <button class="nav-tab ${currentTab==='patterns'?'active':''}" data-tab="patterns" onclick="switchTab('patterns')">Pattern signals</button>
      <button class="nav-tab ${currentTab==='problems'?'active':''}" data-tab="problems" onclick="switchTab('problems')">NeetCode examples</button>

        </div>`).join('')}
      </div>

    </div>
  `;
