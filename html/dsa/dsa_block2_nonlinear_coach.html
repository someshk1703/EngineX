class TreeNode {
    int val;
    TreeNode left, right;
    TreeNode(int val) { this.val = val; }
}

// ─── Inorder Traversal (recursive) ────────────────────
void inorder(TreeNode root, List<Integer> res) {
    if (root == null) return;   // base case
    inorder(root.left, res);    // left subtree
    res.add(root.val);          // process root
    inorder(root.right, res);   // right subtree
}

// ─── Iterative Inorder (avoids stack overflow) ─────────
List<Integer> inorderIterative(TreeNode root) {
    List<Integer> res = new ArrayList<>();
    Deque<TreeNode> stack = new ArrayDeque<>();
    TreeNode cur = root;
    while (cur != null || !stack.isEmpty()) {
        while (cur != null) { stack.push(cur); cur = cur.left; }
        cur = stack.pop();
        res.add(cur.val);
        cur = cur.right;         // move to right subtree
    }
    return res;
}

// ─── BFS / Level Order ────────────────────────────────
List<List<Integer>> levelOrder(TreeNode root) {
    List<List<Integer>> res = new ArrayList<>();
    if (root == null) return res;
    Queue<TreeNode> q = new LinkedList<>();
    q.offer(root);
    while (!q.isEmpty()) {
        int size = q.size();     // snapshot of level size
        List<Integer> level = new ArrayList<>();
        for (int i = 0; i < size; i++) {
            TreeNode node = q.poll();
            level.add(node.val);
            if (node.left != null) q.offer(node.left);
            if (node.right != null) q.offer(node.right);
        }
        res.add(level);
    }
    return res;
}

// ─── Height of Tree ───────────────────────────────────
int height(TreeNode root) {
    if (root == null) return -1;   // -1 for edges, 0 for nodes
    return 1 + Math.max(height(root.left), height(root.right));
}

// ─── Diameter (Longest Path Between Two Nodes) ────────
int[] maxDiam = {0};
int diameterHelper(TreeNode root) {
    if (root == null) return 0;
    int left = diameterHelper(root.left);
    int right = diameterHelper(root.right);
    maxDiam[0] = Math.max(maxDiam[0], left + right); // update global
    return 1 + Math.max(left, right);                 // return height
}`,

    problem:'A path in a binary tree is a sequence of nodes where each pair is connected. The path does not need to go through the root. Return the maximum sum of any path.',
    brute:`// BRUTE FORCE: For every node, compute all paths through it
// Time: O(n^2) — compute contribution from every subtree for each node
// Problem: redundant traversals

int maxSum = Integer.MIN_VALUE;
void brute(TreeNode root) {
    if (root == null) return;
    // compute max gain through this node
    int gain = gainThrough(root);
    maxSum = Math.max(maxSum, gain);
    brute(root.left);
    brute(root.right);
}
int gainThrough(TreeNode node) {
    if (node == null) return 0;
    int left = Math.max(0, gainThrough(node.left));
    int right = Math.max(0, gainThrough(node.right));
    return node.val + left + right;  // repeated work!
}`,
    optimal:`// OPTIMAL: Bottom-up DFS — O(n) time, O(h) space
// Key insight: at each node, the path through it uses BOTH subtrees
// but the return value to parent can only use ONE subtree (no branching upward)

int[] max = {Integer.MIN_VALUE};

int maxPathSum(TreeNode root) {
    dfs(root);
    return max[0];
}

int dfs(TreeNode node) {
    if (node == null) return 0;
    // only take positive contributions from children
    int left  = Math.max(0, dfs(node.left));
    int right = Math.max(0, dfs(node.right));
    // path through this node (can bend here, using both sides)
    max[0] = Math.max(max[0], node.val + left + right);
    // return to parent: can only extend ONE direction
    return node.val + Math.max(left, right);
}
// Why bottom-up? The answer might be a subtree, not at root.
// We compute each node's LOCAL max but maintain a GLOBAL max.`,

  2. One child → replace node with that child
  3. Two children → find inorder successor (smallest in right subtree)

  INORDER = SORTED: Because left < root < right at every node, visiting

  java:`// ─── BST Node ──────────────────────────────────────────
class BST {
    TreeNode root;

    // ─── Insert ─────────────────────────────────────────
    TreeNode insert(TreeNode root, int val) {
        if (root == null) return new TreeNode(val); // base: insert here
        if (val < root.val) root.left = insert(root.left, val);
        else if (val > root.val) root.right = insert(root.right, val);
        // val == root.val: ignore duplicate
        return root;
    }

    // ─── Search ─────────────────────────────────────────
    boolean search(TreeNode root, int val) {
        if (root == null) return false;
        if (val == root.val) return true;
        return val < root.val
            ? search(root.left, val)
            : search(root.right, val);
    }

    // ─── Delete ─────────────────────────────────────────
    TreeNode delete(TreeNode root, int val) {
        if (root == null) return null;
        if (val < root.val) {
            root.left = delete(root.left, val);
        } else if (val > root.val) {
            root.right = delete(root.right, val);
        } else {
            // Case 1: leaf or one child
            if (root.left == null) return root.right;
            if (root.right == null) return root.left;
            // Case 2: two children → find inorder successor
            TreeNode succ = findMin(root.right);
            root.val = succ.val;                       // copy successor value
            root.right = delete(root.right, succ.val); // delete successor
        }
        return root;
    }

    TreeNode findMin(TreeNode node) {
        while (node.left != null) node = node.left; // go all the way left
        return node;

        if (node.val <= min || node.val >= max) return false;
        return validate(node.left, min, node.val)
            && validate(node.right, node.val, max);

        inorder(node.left, k, count, result);
        if (++count[0] == k) { result[0] = node.val; return; }
        inorder(node.right, k, count, result);
    }
}`,

avl:{
  definition:`An AVL Tree (Adelson-Velsky and Landis, 1962) is a self-balancing BST where the height difference between left and right subtrees (the balance factor) is at most 1 for every node. After every insert or delete, it performs rotations to restore balance, guaranteeing O(log n) for all operations in the worst case.`,
  mechanics:`
  Balance Factor = height(left) - height(right)
  Valid values: -1, 0, +1
  
  INSERTION: Insert like BST → walk back up updating heights → if BF becomes ±2, rotate.
  
  4 ROTATION CASES:
  1. Left-Left (BF = +2, left child BF = +1): Right rotate at node
  2. Right-Right (BF = -2, right child BF = -1): Left rotate at node
  3. Left-Right (BF = +2, left child BF = -1): Left rotate at left child, then Right rotate at node
  4. Right-Left (BF = -2, right child BF = +1): Right rotate at right child, then Left rotate at node
  
  Right Rotate(y): x = y.left; y.left = x.right; x.right = y; update heights.
  Left Rotate(x): y = x.right; x.right = y.left; y.left = x; update heights.`,

  java:`// ─── AVL Node ──────────────────────────────────────────
class AVLNode {
    int val, height;
    AVLNode left, right;
    AVLNode(int val) { this.val = val; this.height = 1; }
}

class AVLTree {
    AVLNode root;

    int height(AVLNode n) { return n == null ? 0 : n.height; }

    void updateHeight(AVLNode n) {
        n.height = 1 + Math.max(height(n.left), height(n.right));
    }

    int balanceFactor(AVLNode n) {
        return n == null ? 0 : height(n.left) - height(n.right);
    }

    // ─── Right Rotation (Left-Left case) ────────────────
    //     y                 x
    //    / \               / \
    //   x   T3    →      T1   y
    //  / \                   / \
    // T1  T2               T2  T3
    AVLNode rotateRight(AVLNode y) {
        AVLNode x = y.left;
        AVLNode T2 = x.right;
        x.right = y;        // x becomes new root
        y.left = T2;        // T2 moves to y's left
        updateHeight(y);    // update y FIRST (it's now lower)
        updateHeight(x);    // then x
        return x;
    }

    // ─── Left Rotation (Right-Right case) ───────────────
    AVLNode rotateLeft(AVLNode x) {
        AVLNode y = x.right;
        AVLNode T2 = y.left;
        y.left = x;
        x.right = T2;
        updateHeight(x);
        updateHeight(y);
        return y;
    }

    // ─── Insert with Rebalancing ─────────────────────────
    AVLNode insert(AVLNode node, int val) {
        // 1. Standard BST insert
        if (node == null) return new AVLNode(val);
        if (val < node.val) node.left = insert(node.left, val);
        else if (val > node.val) node.right = insert(node.right, val);
        else return node;  // duplicate

        // 2. Update height of this ancestor
        updateHeight(node);

        // 3. Get balance factor and check if unbalanced
        int bf = balanceFactor(node);

        // Left-Left: right rotate
        if (bf > 1 && val < node.left.val) return rotateRight(node);
        // Right-Right: left rotate
        if (bf < -1 && val > node.right.val) return rotateLeft(node);
        // Left-Right: left rotate left child, then right rotate
        if (bf > 1 && val > node.left.val) {
            node.left = rotateLeft(node.left);
            return rotateRight(node);
        }
        // Right-Left: right rotate right child, then left rotate
        if (bf < -1 && val < node.right.val) {
            node.right = rotateRight(node.right);
            return rotateLeft(node);
        }
        return node;  // balanced, no rotation needed
    }
}`,

TreeNode balanceBST(TreeNode root) {

    collectInorder(root, inorder);      // sorted values

void collectInorder(TreeNode node, List<Integer> list) {
    if (node == null) return;
    collectInorder(node.left, list);
    list.add(node.val);
    collectInorder(node.right, list);

// Always pick middle as root → minimum height tree
TreeNode buildBalanced(List<Integer> vals, int lo, int hi) {
    if (lo > hi) return null;
    int mid = lo + (hi - lo) / 2;     // avoid integer overflow
    TreeNode node = new TreeNode(vals.get(mid));
    node.left  = buildBalanced(vals, lo, mid - 1);
    node.right = buildBalanced(vals, mid + 1, hi);
    return node;

rbt:{
  definition:`A Red-Black Tree is a self-balancing BST where every node is colored RED or BLACK. Five properties guarantee that the longest path is at most 2x the shortest, bounding height at O(log n). Java's TreeMap and TreeSet use Red-Black Trees. They sacrifice AVL's strict balance for fewer rotations on write, making them better for write-heavy workloads.`,
  mechanics:`
  5 RED-BLACK PROPERTIES (memorize these):
  1. Every node is RED or BLACK.
  2. The root is always BLACK.
  3. Every leaf (null sentinel) is BLACK.
  4. If a node is RED, both its children are BLACK. (No two reds in a row)
  5. All paths from a node to its descendant NULL leaves have the same number of BLACK nodes.
     (Black-height is uniform)
  
  These properties imply: height ≤ 2 * log₂(n+1)
  
  INSERTION: Insert RED node (never violates property 5) → fix violations of property 4:
  - Uncle is RED: recolor parent+uncle BLACK, grandparent RED → recurse up
  - Uncle is BLACK with triangle: rotate to make it a line case
  - Uncle is BLACK with line: rotate at grandparent, recolor
  
  WHY Java uses RBT over AVL: Fewer rotations on insert/delete → better for
  maps/sets where writes are frequent. TreeMap: O(log n) put/get/remove guaranteed.`,

// For each new element, check if any element in [num-t, num+t] exists in TreeSet
// TreeSet.subSet / floor / ceiling gives O(log k) per element

boolean containsNearbyAlmostDuplicate(int[] nums, int k, int t) {
    TreeSet<Long> window = new TreeSet<>();
    for (int i = 0; i < nums.length; i++) {
        long num = nums[i];
        // check if there's a value in [num-t, num+t]
        Long floor = window.floor(num + t);     // largest ≤ num+t
        if (floor != null && floor >= num - t) return true;
        window.add(num);
        // maintain window size k
        if (i >= k) window.remove((long) nums[i - k]);
    }
    return false;
}

heap:{
  definition:`A Heap is a complete binary tree satisfying the heap property. In a Min-Heap, every parent is ≤ its children — the root is always the minimum. In a Max-Heap, every parent is ≥ its children — the root is always the maximum. Heaps are implemented as arrays (no pointers needed) and power Java's PriorityQueue.`,
  mechanics:`
  ARRAY REPRESENTATION (0-indexed):
  • Parent of i    = (i - 1) / 2
  • Left child     = 2*i + 1
  • Right child    = 2*i + 2
  
  The complete binary tree property fills left-to-right, so the array
  has no gaps — perfectly packed memory layout.
  
  HEAPIFY UP (used in insert):
  Add element at end → compare with parent → swap if violates → repeat upward
  O(log n) — at most height swaps.
  
  HEAPIFY DOWN (used in extract):
  Swap root with last element → remove last → compare root with children
  → swap with smallest child (min-heap) → repeat downward
  O(log n) — at most height swaps.
  
  BUILD HEAP (from array): Start at last non-leaf (n/2 - 1) → heapify down each.
  O(n) — NOT O(n log n). Mathematical proof: sum of heights across all nodes = O(n).`,

class MedianFinder {
    PriorityQueue<Integer> lo = new PriorityQueue<>(Comparator.reverseOrder()); // max-heap
    PriorityQueue<Integer> hi = new PriorityQueue<>();  // min-heap

    void addNum(int num) {
        lo.offer(num);                   // always add to lower half first
        hi.offer(lo.poll());             // balance: push max of lo → hi
        if (hi.size() > lo.size())       // lo must be >= hi in size
            lo.offer(hi.poll());

        return lo.size() > hi.size()

            : (lo.peek() + hi.peek()) / 2.0; // even total: average of tops

void heapifyDown(int[] arr, int n, int i) {
    int smallest = i, left = 2*i+1, right = 2*i+2;
    if (left < n && arr[left] < arr[smallest]) smallest = left;
    if (right < n && arr[right] < arr[smallest]) smallest = right;
    if (smallest != i) {
        int tmp = arr[i]; arr[i] = arr[smallest]; arr[smallest] = tmp;
        heapifyDown(arr, n, smallest);

// Upper half: min-heap (top = upper median)
// INVARIANT: lo.size() == hi.size() OR lo.size() == hi.size() + 1

class MedianFinder {
    PriorityQueue<Integer> lo = new PriorityQueue<>(Collections.reverseOrder());
    PriorityQueue<Integer> hi = new PriorityQueue<>();

    void addNum(int num) {
        lo.offer(num);           // step 1: add to lo
        hi.offer(lo.poll());     // step 2: push lo's max to hi (ensures lo ≤ hi)
        if (hi.size() > lo.size())   // step 3: rebalance size
            lo.offer(hi.poll());
    }

    double findMedian() {
        if (lo.size() > hi.size()) return lo.peek();
        return (lo.peek() + hi.peek()) / 2.0;
    }
}
// Why two heaps? We need O(1) access to the MIDDLE of a sorted stream.
// lo.peek() = max of lower half = left median element
// hi.peek() = min of upper half = right median element`,

  definition:`A Trie (Prefix Tree or Retrieval Tree, pronounced "try") is a tree-like data structure where each node represents a character, and paths from root to nodes represent prefixes/words. It enables O(L) insert, search, and prefix search where L is the string length — independent of the number of stored words. Essential for autocomplete, spell check, and IP routing.`,

  java:`// ─── Trie Node ────────────────────────────────────────
class TrieNode {
    TrieNode[] children = new TrieNode[26];  // for lowercase a-z
    boolean isEnd = false;                    // marks complete word
}

// ─── Trie ─────────────────────────────────────────────
class Trie {
    TrieNode root = new TrieNode();

    // ─── Insert ──────────────────────────────────────
    void insert(String word) {
        TrieNode cur = root;
        for (char c : word.toCharArray()) {
            int idx = c - 'a';
            if (cur.children[idx] == null)
                cur.children[idx] = new TrieNode(); // create if absent
            cur = cur.children[idx];
        }
        cur.isEnd = true;  // mark end of word
    }

    // ─── Search (exact word) ──────────────────────────
    boolean search(String word) {
        TrieNode node = traverse(word);
        return node != null && node.isEnd; // must reach end AND be a word
    }

    // ─── Starts With (prefix exists) ─────────────────
    boolean startsWith(String prefix) {
        return traverse(prefix) != null;   // just reach the prefix node
    }

    // ─── Helper: traverse to end of string ───────────
    TrieNode traverse(String s) {
        TrieNode cur = root;
        for (char c : s.toCharArray()) {
            int idx = c - 'a';
            if (cur.children[idx] == null) return null; // path broken
            cur = cur.children[idx];
        }
        return cur;
    }

    // ─── Autocomplete: all words with given prefix ────
    List<String> autocomplete(String prefix) {
        TrieNode node = traverse(prefix);
        List<String> results = new ArrayList<>();
        if (node != null) dfs(node, new StringBuilder(prefix), results);
        return results;
    }

    void dfs(TrieNode node, StringBuilder sb, List<String> results) {
        if (node.isEnd) results.add(sb.toString());
        for (int i = 0; i < 26; i++) {
            if (node.children[i] != null) {
                sb.append((char)('a' + i));
                dfs(node.children[i], sb, results);
                sb.deleteCharAt(sb.length() - 1); // backtrack
            }
        }
    }
}

// ─── Binary Trie for Maximum XOR ─────────────────────
int findMaximumXOR(int[] nums) {
    // Build trie on bits (MSB to LSB, assume 32-bit)
    int[][] trie = new int[nums.length * 32][2];
    int idx = 1; // 0 = null sentinel
    for (int num : nums) {
        int cur = 0;
        for (int i = 31; i >= 0; i--) {
            int bit = (num >> i) & 1;
            if (trie[cur][bit] == 0) trie[cur][bit] = idx++;
            cur = trie[cur][bit];
        }
    }
    int max = 0;
    for (int num : nums) {
        int cur = 0, xor = 0;
        for (int i = 31; i >= 0; i--) {
            int bit = (num >> i) & 1;
            int want = 1 - bit;  // greedily choose opposite bit
            if (trie[cur][want] != 0) { xor |= (1 << i); cur = trie[cur][want]; }
            else cur = trie[cur][bit];
        }
        max = Math.max(max, xor);
    }
    return max;
}`,

    optimal:`// OPTIMAL: Build Trie of all words, single DFS over board — O(m*n*4^L)
// Key: Trie prunes entire subtrees that can't match any word
// Instead of checking each word separately, check ALL words simultaneously

List<String> findWords(char[][] board, String[] words) {
    Trie trie = new Trie();
    for (String w : words) trie.insert(w);

    List<String> res = new ArrayList<>();
    int m = board.length, n = board[0].length;
    boolean[][] visited = new boolean[m][n];

    for (int i = 0; i < m; i++)
        for (int j = 0; j < n; j++)
            dfs(board, i, j, trie.root, new StringBuilder(), res, visited);
    return res;
}

void dfs(char[][] board, int i, int j, TrieNode node,
         StringBuilder path, List<String> res, boolean[][] visited) {
    if (i<0||i>=board.length||j<0||j>=board[0].length||visited[i][j]) return;
    char c = board[i][j];
    TrieNode next = node.children[c - 'a'];
    if (next == null) return;  // PRUNE: no word with this prefix

    visited[i][j] = true;
    path.append(c);
    if (next.isEnd) {
        res.add(path.toString());
        next.isEnd = false;  // avoid duplicates
    }
    int[][] dirs = {{0,1},{0,-1},{1,0},{-1,0}};
    for (int[] d : dirs) dfs(board, i+d[0], j+d[1], next, path, res, visited);
    path.deleteCharAt(path.length() - 1);
    visited[i][j] = false;    // backtrack
}`,

segtree:{
  definition:`A Segment Tree is a binary tree built over an array where each node stores aggregate information (sum, min, max, GCD, etc.) for a contiguous subarray. It answers range queries (e.g., "sum of elements from index 3 to 10") and supports point updates in O(log n) time — far better than prefix sums (O(n) update) or brute force (O(n) query).`,
  mechanics:`
  Build: Root covers [0, n-1]. Left child = [0, mid], right child = [mid+1, n-1].
  Recursively build until leaf nodes (single elements).
  
  Array size needed: 4*n (to be safe — leaves + internal nodes)
  
  Node at position i:
  • Left child  = 2*i
  • Right child = 2*i + 1
  • OR: tree[i] stores aggregate for range [l, r]; children are [l, mid] and [mid+1, r]
  
  QUERY [ql, qr]: If current range fully inside [ql,qr] → return value.
                   If no overlap → return identity. Otherwise split and combine.
  
  UPDATE (point): Walk down to leaf matching index → update → propagate up.
  
  LAZY PROPAGATION: For range updates ("add X to all elements in [l, r]"):
  Instead of updating every element, mark a "lazy" tag at the highest covering node.
  Push lazy down only when a node's children need to be accessed.
  Converts range update from O(n) to O(log n).`,
  complexity:[
    {op:'Build',avg:'O(n)',worst:'O(n)',why:'Visit each of 2n nodes once (leaves + internal).'},
    {op:'Point update',avg:'O(log n)',worst:'O(log n)',why:'Walk root to leaf: height = log n.'},
    {op:'Range query',avg:'O(log n)',worst:'O(log n)',why:'At most 4 * log n nodes visited (proof: each level contributes ≤4).'},
    {op:'Range update (lazy)',avg:'O(log n)',worst:'O(log n)',why:'Update O(log n) nodes, defer to children via lazy tags.'},
    {op:'Space',avg:'O(n)',worst:'O(4n)',why:'4n array allocation ensures all nodes fit.'},

  java:`// ─── Segment Tree (Range Sum, Point Update) ───────────
class SegmentTree {
    int[] tree;
    int n;

    SegmentTree(int[] arr) {
        n = arr.length;
        tree = new int[4 * n];  // safe upper bound
        build(arr, 0, 0, n - 1);
    }

    // ─── Build ────────────────────────────────────────
    void build(int[] arr, int node, int l, int r) {
        if (l == r) { tree[node] = arr[l]; return; }  // leaf
        int mid = l + (r - l) / 2;
        build(arr, 2*node, l, mid);         // build left
        build(arr, 2*node+1, mid+1, r);     // build right
        tree[node] = tree[2*node] + tree[2*node+1]; // aggregate
    }

    // ─── Point Update ─────────────────────────────────
    void update(int node, int l, int r, int idx, int val) {
        if (l == r) { tree[node] = val; return; }  // at leaf
        int mid = l + (r - l) / 2;
        if (idx <= mid) update(2*node, l, mid, idx, val);
        else            update(2*node+1, mid+1, r, idx, val);
        tree[node] = tree[2*node] + tree[2*node+1]; // recompute
    }

    // ─── Range Query [ql, qr] ─────────────────────────
    int query(int node, int l, int r, int ql, int qr) {
        if (ql <= l && r <= qr) return tree[node]; // fully covered
        if (qr < l || r < ql) return 0;            // no overlap (0 = identity for sum)
        int mid = l + (r - l) / 2;
        return query(2*node, l, mid, ql, qr)
             + query(2*node+1, mid+1, r, ql, qr);
    }

    // Public API: hide internal params
    void update(int idx, int val) { update(1, 0, n-1, idx, val); }
    int query(int l, int r) { return query(1, 0, n-1, l, r); }
}

// ─── Lazy Propagation (Range Add, Range Sum Query) ────
class LazySegTree {
    int[] tree, lazy;
    int n;

    LazySegTree(int[] arr) {
        n = arr.length; tree = new int[4*n]; lazy = new int[4*n];
        build(arr, 1, 0, n-1);
    }

    void build(int[] a, int node, int l, int r) {
        if (l == r) { tree[node] = a[l]; return; }
        int m = (l+r)/2;
        build(a, 2*node, l, m); build(a, 2*node+1, m+1, r);
        tree[node] = tree[2*node] + tree[2*node+1];
    }

    void pushDown(int node, int l, int r) {
        if (lazy[node] != 0) {
            int m = (l+r)/2;
            // apply lazy to children
            tree[2*node]   += lazy[node] * (m - l + 1);
            lazy[2*node]   += lazy[node];
            tree[2*node+1] += lazy[node] * (r - m);
            lazy[2*node+1] += lazy[node];
            lazy[node] = 0;  // clear after pushing
        }
    }

    void rangeAdd(int node, int l, int r, int ql, int qr, int val) {
        if (ql <= l && r <= qr) {
            tree[node] += val * (r - l + 1);
            lazy[node] += val; return;
        }
        if (qr < l || r < ql) return;
        pushDown(node, l, r);  // CRITICAL: push before going to children
        int m = (l+r)/2;
        rangeAdd(2*node, l, m, ql, qr, val);
        rangeAdd(2*node+1, m+1, r, ql, qr, val);
        tree[node] = tree[2*node] + tree[2*node+1];
    }
}`,

bit:{
  definition:`A Fenwick Tree (Binary Indexed Tree, BIT) is a data structure that efficiently answers prefix sum queries and supports point updates — both in O(log n). It uses a clever bit manipulation trick to store partial sums in an array, making it 2-3x more cache-friendly and shorter to code than a Segment Tree, at the cost of being limited to invertible/associative operations.`,
  mechanics:`
  KEY INSIGHT: Each index i stores the sum of a range of elements determined by 
  the lowest set bit (LSB) of i.
  
  i = 6 (binary 110): LSB = 2, so tree[6] stores sum of arr[5..6] (2 elements)
  i = 4 (binary 100): LSB = 4, so tree[4] stores sum of arr[1..4] (4 elements)
  i = 8 (binary 1000): LSB = 8, so tree[8] stores sum of arr[1..8]
  
  LSB trick: i & (-i) gives the lowest set bit of i.
  
  PREFIX SUM QUERY (1-indexed):
  sum(i): result += tree[i]; i -= i & (-i);  // remove LSB, go to parent
  
  POINT UPDATE:
  update(i, delta): tree[i] += delta; i += i & (-i);  // add LSB, go to next responsible
  
  Both operations traverse at most log n steps.
  
  Range sum [l, r] = prefix(r) - prefix(l-1)  (using invertibility of subtraction)`,
  complexity:[
    {op:'Prefix sum query',avg:'O(log n)',worst:'O(log n)',why:'Remove LSB each step: at most log n steps (bits in n).'},
    {op:'Point update',avg:'O(log n)',worst:'O(log n)',why:'Add LSB each step: at most log n steps.'},
    {op:'Build from array',avg:'O(n log n)',worst:'O(n log n)',why:'n updates each O(log n). O(n) possible with a smarter init.'},
    {op:'Range sum query',avg:'O(log n)',worst:'O(log n)',why:'Two prefix queries.'},

  java:`// ─── Fenwick Tree (1-indexed, Range Sum) ──────────────
class FenwickTree {
    int[] tree;
    int n;

    FenwickTree(int n) {
        this.n = n;
        tree = new int[n + 1];  // 1-indexed: tree[0] unused
    }

    // ─── Point Update ─────────────────────────────────
    // Adds delta to position i, propagates to all responsible ranges
    void update(int i, int delta) {
        for (; i <= n; i += i & (-i))  // add lowest set bit
            tree[i] += delta;
    }

    // ─── Prefix Sum [1, i] ────────────────────────────
    // Sum from index 1 to i (1-indexed)
    int query(int i) {
        int sum = 0;
        for (; i > 0; i -= i & (-i))   // remove lowest set bit
            sum += tree[i];
        return sum;
    }

    // ─── Range Sum [l, r] ─────────────────────────────
    int query(int l, int r) {
        return query(r) - query(l - 1);
    }

    // ─── Build from array — O(n log n) ────────────────
    FenwickTree(int[] arr) {
        this(arr.length);
        for (int i = 0; i < arr.length; i++)
            update(i + 1, arr[i]);  // convert to 1-indexed
    }
}

// ─── Count Inversions using BIT ───────────────────────
int countInversions(int[] arr) {
    // Coordinate compress to [1..n]
    int[] sorted = arr.clone();
    Arrays.sort(sorted);
    Map<Integer, Integer> rank = new HashMap<>();
    for (int i = 0; i < sorted.length; i++)
        rank.put(sorted[i], i + 1);  // 1-indexed rank

    FenwickTree bit = new FenwickTree(arr.length);
    int inversions = 0;
    for (int i = arr.length - 1; i >= 0; i--) {
        int r = rank.get(arr[i]);
        inversions += bit.query(r - 1); // count elements < arr[i] seen to right
        bit.update(r, 1);               // mark arr[i] as seen
    }
    return inversions;
}

// ─── BIT for Rank Query (How many ≤ x) ──────────────
// Useful for problems needing dynamic order statistics
// Key: coordinate compress values, use BIT on value space
// update(val): mark val as present
// query(val): count how many present values are ≤ val

// ─── Range Update, Point Query (Difference Array BIT) ─
class DiffBIT {
    FenwickTree bit;
    DiffBIT(int n) { bit = new FenwickTree(n); }
    void rangeAdd(int l, int r, int val) {
        bit.update(l, val);
        if (r + 1 <= bit.n) bit.update(r + 1, -val);
    }
    int pointQuery(int i) { return bit.query(i); } // prefix sum = value at i
}`,

uf:{
  definition:`Union-Find (Disjoint Set Union, DSU) is a data structure that tracks elements partitioned into disjoint (non-overlapping) groups. It supports two operations: find(x) — which group does x belong to? — and union(x, y) — merge x's group with y's group. With two optimizations (path compression + union by rank), both operations run in near-constant amortized time O(α(n)) where α is the inverse Ackermann function — effectively O(1) for any practical n.`,
  mechanics:`
  Internal: parent[] array where parent[i] = i means i is its own root (set representative).
  Initially: parent[i] = i (each element is its own group).
  
  FIND (with Path Compression):
  Follow parent pointers to root. On the way back, point every visited node
  directly to root ("path compression"). Future finds for these nodes go directly to root.
  
  UNION (by Rank/Size):
  Find root of both elements. If different roots, merge the smaller tree under the larger.
  rank[] tracks tree height (or size[]).
  
  WHY O(α(n))? The inverse Ackermann function grows so slowly that for any n
  ≤ 10^600, α(n) ≤ 4. Combined path compression + union by rank guarantees this.
  
  Key applications:
  • Detecting cycles in undirected graphs
  • Kruskal's MST algorithm
  • Connected components
  • Dynamic connectivity`,

    {op:'Make Set',avg:'O(1)',worst:'O(1)',why:'Just set parent[i] = i.'},

    {op:'Find (path compression)',avg:'O(log n)',worst:'O(log n)',why:'Amortized — future finds are O(1).'},
    {op:'Find (compression + rank)',avg:'O(α(n))',worst:'O(α(n))',why:'Inverse Ackermann — practically O(1).'},
    {op:'Union (by rank)',avg:'O(α(n))',worst:'O(α(n))',why:'Calls Find twice + O(1) merge.'},

  java:`// ─── Union-Find with Path Compression + Union by Rank ─
class UnionFind {
    int[] parent, rank;
    int components;  // track number of disjoint sets

    UnionFind(int n) {
        parent = new int[n];
        rank = new int[n];
        components = n;
        for (int i = 0; i < n; i++) parent[i] = i; // each is own root
    }

    // ─── Find with Path Compression ──────────────────
    int find(int x) {
        if (parent[x] != x)
            parent[x] = find(parent[x]); // recursively compress path
        return parent[x];
    }

    // ─── Iterative path compression (avoids stack overflow) ──
    int findIterative(int x) {
        int root = x;
        while (parent[root] != root) root = parent[root]; // find root
        while (parent[x] != root) {     // path compression
            int next = parent[x];
            parent[x] = root;
            x = next;
        }
        return root;
    }

    // ─── Union by Rank ────────────────────────────────
    boolean union(int x, int y) {
        int rx = find(x), ry = find(y);
        if (rx == ry) return false; // already same component
        // attach smaller rank tree under larger rank
        if (rank[rx] < rank[ry]) { int tmp = rx; rx = ry; ry = tmp; }
        parent[ry] = rx;                    // ry → rx
        if (rank[rx] == rank[ry]) rank[rx]++; // only grows when equal
        components--;
        return true;
    }

    boolean connected(int x, int y) { return find(x) == find(y); }
    int getComponents() { return components; }
}

// ─── Kruskal's MST ────────────────────────────────────
int kruskalMST(int n, int[][] edges) {
    // edges: [u, v, weight]
    Arrays.sort(edges, (a, b) -> a[2] - b[2]); // sort by weight
    UnionFind uf = new UnionFind(n);
    int totalWeight = 0, edgesUsed = 0;
    for (int[] edge : edges) {
        if (uf.union(edge[0], edge[1])) { // if connects different components
            totalWeight += edge[2];
            edgesUsed++;
            if (edgesUsed == n - 1) break; // MST complete
        }
    }
    return edgesUsed == n - 1 ? totalWeight : -1; // -1 if not connected
}

// ─── Number of Islands (Union-Find approach) ──────────
int numIslands(char[][] grid) {
    int m = grid.length, n = grid[0].length;
    UnionFind uf = new UnionFind(m * n);
    // subtract water cells from component count
    int water = 0;
    for (int i = 0; i < m; i++)
        for (int j = 0; j < n; j++)
            if (grid[i][j] == '0') water++;

    int[][] dirs = {{0,1},{0,-1},{1,0},{-1,0}};
    for (int i = 0; i < m; i++)
        for (int j = 0; j < n; j++)
            if (grid[i][j] == '1')
                for (int[] d : dirs) {
                    int ni = i+d[0], nj = j+d[1];
                    if (ni>=0&&ni<m&&nj>=0&&nj<n&&grid[ni][nj]=='1')
                        uf.union(i*n+j, ni*n+nj);
                }
    return uf.getComponents() - water;
}`,

// Key insight: Process edges in order. The FIRST edge where find(u) == find(v)
// is the redundant edge — adding it would create a cycle.

int[] findRedundantConnection(int[][] edges) {
    int n = edges.length;
    UnionFind uf = new UnionFind(n + 1); // 1-indexed nodes
    for (int[] edge : edges) {
        int u = edge[0], v = edge[1];
        if (!uf.union(u, v)) {
            return edge; // find(u) == find(v) → this edge creates cycle
        }
    }
    return new int[]{};  // unreachable by problem constraints
}

// Why Union-Find?
// Tree has exactly n-1 edges. Adding one more creates exactly one cycle.
// As we add edges, Union-Find tracks connectivity.
// The first edge that connects two already-connected nodes = the cycle edge.
// O(n α(n)) ≈ O(n) — perfect for this problem.

// Alternative: DFS to detect cycle — same time complexity,
// but Union-Find is far more elegant and interview-friendly here.`,

let currentTopic = 'bt';
let currentSection = 0;

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = TOPICS.map(t =>
    `<div class="nav-item${t.id===currentTopic?' active':''}" onclick="setTopic('${t.id}')">
      <span>${t.icon}</span><span>${t.short}</span>

function renderTabs() {
  return `<div class="section-tabs">${SECTIONS.map((s,i)=>
    `<div class="tab${i===currentSection?' active':''}" onclick="setSection(${i})">${s}</div>`
  ).join('')}</div>`;
}

function codeBlock(code) {
  return `<pre>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
}

function badge(text) {
  const map = {'O(1)':'badge-o1','O(log n)':'badge-ologn','O(n)':'badge-on','O(n log n)':'badge-onlogn','O(n^2)':'badge-on2'};
  return `<span class="badge ${map[text]||'badge-on'}">${text}</span>`;
}

function renderSection(t, d) {
  const s = currentSection;
  if(s===0) return `
    <div class="card"><div class="card-title">What is it?</div><p>${d.definition}</p></div>`;
  if(s===1) return `
    <div class="card"><div class="card-title">How it works under the hood</div>

    </tbody></table>`;
  if(s===3) return `
    <div class="variants-grid">${d.subtypes.map(s=>`<div class="card"><div class="card-title">${s.name}</div><p>${s.desc}</p></div>`).join('')}</div>`;

  if(s===6) return codeBlock(d.java);
  if(s===7) {
    const w = d.worked;
