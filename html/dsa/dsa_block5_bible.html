<script>
const TABS = ["Definition","Mechanics","Complexity","Variants","Patterns","Smell→Pattern","Java Code","Worked Example","Practice","Interview"];

const DATA = [
{
  title:"Recursion Fundamentals",
  subtitle:"Base case · Recursive case · Call stack depth",
  sections:[
    // 0 Definition
    `<div class="card"><div class="card-label">What it is</div><div class="card-text">Recursion is a technique where a function solves a problem by calling itself on a smaller version of the same input, until it reaches a base case it can answer directly. Think of it as a <strong>delegation chain</strong>: each call delegates the hard part to a smaller self, and the answers bubble back up.</div></div>
    <div class="highlight">Three pillars: <strong>Base case</strong> (when to stop) · <strong>Recursive case</strong> (how to shrink the problem) · <strong>Trust the recursion</strong> (assume the smaller call works correctly)</div>
    <div class="card"><div class="card-label">Call stack intuition</div><div class="card-text">Every recursive call pushes a stack frame (local vars + return address). The stack unwinds as base cases return. Stack depth = recursion depth. Each frame is O(1) space, so total space = O(depth).</div></div>`,

    // 1 Mechanics
    `<div class="card"><div class="card-label">How it works under the hood</div><div class="card-text">The JVM maintains a call stack in a dedicated memory region (stack segment). Each method invocation creates a <strong>stack frame</strong> containing: local variables, parameters, return address, and operand stack. Recursive calls stack frames on top of each other. When a base case returns, the frame is popped and the previous frame resumes execution.</div></div>
    <div class="code-block">factorial(4)
  └─ factorial(3)
       └─ factorial(2)
            └─ factorial(1)  ← BASE CASE returns 1
         returns 1*2 = 2
    returns 2*3 = 6
  returns 6*4 = 24</div>
    <div class="highlight"><strong>StackOverflowError</strong> in Java = call stack exhausted. Default JVM stack: ~500–1000 frames. Deep recursion on large inputs must use iterative approach or tail-call optimization (Java doesn't do TCO natively).</div>
    <div class="card"><div class="card-label">Tail recursion note</div><div class="card-text">Java does NOT optimize tail calls. Even if the recursive call is the last statement, a new frame is still pushed. To avoid stack overflow on large n, convert to iteration or use trampolining.</div></div>`,

    // 2 Complexity
    `<table class="complexity-table"><tr><th>Operation</th><th>Time</th><th>Space (stack)</th><th>Why</th></tr>
    <tr><td>factorial(n)</td><td class="o-good">O(n)</td><td class="o-good">O(n)</td><td>n frames, each O(1) work</td></tr>
    <tr><td>fibonacci(n) naive</td><td class="o-bad">O(2ⁿ)</td><td class="o-good">O(n)</td><td>Binary tree of calls, exponential nodes; depth is n</td></tr>
    <tr><td>fibonacci(n) memo</td><td class="o-good">O(n)</td><td class="o-good">O(n)</td><td>Each subproblem computed once</td></tr>
    <tr><td>binary search recursive</td><td class="o-good">O(log n)</td><td class="o-good">O(log n)</td><td>Halving input each call; log n frames</td></tr>
    <tr><td>tree traversal</td><td class="o-good">O(n)</td><td class="o-good">O(h)</td><td>Visit each node once; stack depth = tree height h</td></tr>
    </table>
    <div class="highlight" style="margin-top:12px"><strong>Recurrence relation tip:</strong> T(n) = T(n-1) + O(1) → O(n). T(n) = 2T(n/2) + O(n) → O(n log n). T(n) = T(n-1) + O(n) → O(n²).</div>`,

    // 3 Variants
    `<div class="pattern-card"><div class="pattern-name">Linear Recursion</div><div class="pattern-when">One recursive call per invocation. Problem shrinks linearly. E.g., factorial, linked list traversal.</div></div>
    <div class="pattern-card"><div class="pattern-name">Binary Recursion</div><div class="pattern-when">Two recursive calls per invocation. Tree-like expansion. E.g., fibonacci, tree traversal, merge sort.</div></div>
    <div class="pattern-card"><div class="pattern-name">Tail Recursion</div><div class="pattern-when">Recursive call is the very last operation. No work done on return. Can be converted to loop. Java doesn't auto-optimize but useful to recognize.</div></div>
    <div class="pattern-card"><div class="pattern-name">Mutual Recursion</div><div class="pattern-when">Function A calls B, B calls A. Used in parsers, state machines. E.g., isEven/isOdd recursive definition.</div></div>
    <div class="pattern-card"><div class="pattern-name">Tree Recursion (Multi-branching)</div><div class="pattern-when">Each call spawns 2+ recursive calls. Exponential without memoization. Core of backtracking exploration.</div></div>`,

    // 4 Patterns
    `<div class="pattern-card"><div class="pattern-name">1. Reduce & Delegate</div><div class="trigger">Mental trigger: "solve for n-1, then handle the nth element"</div><div class="pattern-when">Shrink the problem by one unit, trust the recursive result, combine. Classic: factorial, sum of array, reverse a string.</div></div>
    <div class="pattern-card"><div class="pattern-name">2. Tree of Choices</div><div class="trigger">Mental trigger: "at each step I have multiple choices, explore all"</div><div class="pattern-when">Every recursive call branches on a decision. Foundation of backtracking. Used for subsets, permutations.</div></div>
    <div class="pattern-card"><div class="pattern-name">3. Divide in Half</div><div class="trigger">Mental trigger: "split at midpoint, recurse both halves"</div><div class="pattern-when">Binary search, merge sort, quick sort. Achieves O(log n) or O(n log n).</div></div>
    <div class="pattern-card"><div class="pattern-name">4. Memoized Recursion (Top-down DP)</div><div class="trigger">Mental trigger: "I'm computing the same subproblem repeatedly"</div><div class="pattern-when">Cache return values in a HashMap keyed by parameters. Converts O(2ⁿ) to O(n). Fibonacci, coin change, LCS.</div></div>`,

    // 5 Smell → Pattern
    `<div class="card"><div class="card-label">Problem smell → pattern map</div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">compute f(n) using f(n-1)</span><span class="smell-why">→ Linear recursion / Reduce & delegate</span></div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">same subproblem appears in different branches</span><span class="smell-why">→ Memoization (top-down DP)</span></div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">tree/graph traversal without a loop</span><span class="smell-why">→ DFS recursive with implicit stack</span></div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">process each half independently</span><span class="smell-why">→ Divide & conquer</span></div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">enumerate all valid configurations</span><span class="smell-why">→ Backtracking / tree of choices</span></div>
    <div class="smell-row"><span class="smell-if">IF</span><span class="smell-then">StackOverflowError on large input</span><span class="smell-why">→ Convert to iterative or memoize</span></div>
    </div>`,

    // 6 Java
    `<div class="code-block">// 1. Factorial — classic linear recursion
int factorial(int n) {
    if (n <= 1) return 1;         // base case
    return n * factorial(n - 1);  // recursive case
}

// 2. Fibonacci — memoized to avoid O(2^n)
Map&lt;Integer,Integer&gt; memo = new HashMap&lt;&gt;();
int fib(int n) {
    if (n <= 1) return n;
    if (memo.containsKey(n)) return memo.get(n);
    int result = fib(n-1) + fib(n-2);
    memo.put(n, result);
    return result;
}

// 3. Power of x — reduce & delegate
double myPow(double x, int n) {
    if (n == 0) return 1;
    if (n < 0) return 1.0 / myPow(x, -n);
    if (n % 2 == 0) {             // even: square the half-power
        double half = myPow(x, n/2);
        return half * half;
    }
    return x * myPow(x, n-1);    // odd: peel one
}

// 4. Sum of digits recursively
int digitSum(int n) {
    if (n < 10) return n;         // base: single digit
    return (n % 10) + digitSum(n / 10);
}</div>`,

    // 7 Worked Example
    `<div class="card"><div class="card-label">LeetCode 50 — Pow(x, n)</div>
    <div class="card-text">Given x and n, compute xⁿ efficiently.</div></div>
    <div class="highlight"><strong>Brute force:</strong> multiply x by itself n times → O(n). Too slow for n up to 2³¹.</div>
    <div class="code-block">// BRUTE FORCE — O(n)
double bruteForce(double x, int n) {
    double result = 1;
    for (int i = 0; i &lt; Math.abs(n); i++) result *= x;
    return n &lt; 0 ? 1.0 / result : result;
}

// OPTIMAL — Fast Exponentiation O(log n)
// Pattern: if n is even, xⁿ = (x²)^(n/2) — halve the problem!
double myPow(double x, long n) {
    if (n == 0) return 1;
    if (n &lt; 0) { x = 1/x; n = -n; }
    if (n % 2 == 0) return myPow(x * x, n / 2); // even: square base
    return x * myPow(x * x, n / 2);             // odd: peel one factor
}
// Why log n? Each call halves n → log₂(n) levels deep.</div>
    <div class="highlight"><strong>Why recursion?</strong> The problem has optimal substructure: xⁿ is defined perfectly in terms of x^(n/2). Recursion makes this natural to express.</div>`,

    // 8 Practice
    `<div class="problem-card"><div class="problem-diff easy">Easy</div><div class="problem-name">LC 509 — Fibonacci Number</div><div class="problem-meta"><strong>Why:</strong> Purest recursive definition. Forces you to see memoization need.<br><strong>Key insight:</strong> fib(n) = fib(n-1) + fib(n-2), cache to avoid recomputation.</div></div>
    <div class="problem-card"><div class="problem-diff easy">Easy</div><div class="problem-name">LC 206 — Reverse Linked List (recursive)</div><div class="problem-meta"><strong>Why:</strong> Trains "delegate to n-1, then fix the last step".<br><strong>Key insight:</strong> Reverse tail first, then repoint current node.</div></div>
    <div class="problem-card"><div class="problem-diff medium">Medium</div><div class="problem-name">LC 50 — Pow(x, n)</div><div class="problem-meta"><strong>Why:</strong> Teaches divide-in-half recursion pattern.<br><strong>Key insight:</strong> Even/odd split halves the depth to O(log n).</div></div>
    <div class="problem-card"><div class="problem-diff medium">Medium</div><div class="problem-name">LC 779 — K-th Symbol in Grammar</div><div class="problem-meta"><strong>Why:</strong> Pure recursive structure with no obvious loop form.<br><strong>Key insight:</strong> Position in row n depends on position in row n-1.</div></div>
    <div class="problem-card"><div class="problem-diff hard">Hard</div><div class="problem-name">LC 761 — Special Binary Strings</div><div class="problem-meta"><strong>Why:</strong> Recursive decomposition of structure within structure.<br><strong>Key insight:</strong> Identify balanced substrings, recurse inside each, sort.</div></div>`,

    // 9 Interview
    `<div class="card"><div class="card-label">What interviewers test</div>
    <div class="interview-pill"><span class="pill-dot"></span><span>Can you identify the base case correctly? (Most bugs live here)</span></div>
    <div class="interview-pill"><span class="pill-dot"></span><span>Do you spontaneously spot memoization opportunities?</span></div>
    <div class="interview-pill"><span class="pill-dot"></span><span>Can you trace the call stack verbally for small input?</span></div>
    <div class="interview-pill"><span class="pill-dot"></span><span>Do you mention StackOverflow risk and iterative conversion?</span></div>
    </div>
    <div class="card"><div class="card-label">Common follow-up questions</div>
    <div class="interview-pill"><span class="pill-dot"></span><span>"What's the space complexity?" → they want stack depth, not just output space</span></div>
    <div class="interview-pill"><span class="pill-dot"></span><span>"Can you do this iteratively?" → always know how to convert</span></div>
    <div class="interview-pill"><span class="pill-dot"></span><span>"What happens if n = 0 or negative?" → edge case handling</span></div>
    </div>
    <div class="highlight"><strong>Think-aloud script:</strong> "I'll define the base case as [X]. For the recursive case, I'll assume the function correctly handles [n-1] and then [combine]. Let me trace through a small example to verify..."</div>`
  ]
},

{
  title:"Divide & Conquer",
  subtitle:"Merge sort · Quick sort · Master theorem",
  sections:[
    `<div class="card"><div class="card-label">What it is</div><div class="card-text">Divide & Conquer is a paradigm that solves a problem by: (1) <strong>Dividing</strong> it into independent subproblems of the same type, (2) <strong>Conquering</strong> each subproblem recursively, and (3) <strong>Combining</strong> their results. Unlike simple recursion, D&C subproblems are truly independent — no overlap. If they do overlap, it becomes Dynamic Programming.</div></div>
    <div class="highlight">D&C vs DP: D&C subproblems don't share state. DP subproblems overlap. Merge sort = D&C. Fibonacci = DP.</div>
    <div class="card"><div class="card-label">The Master Theorem</div><div class="card-text">For recurrence T(n) = aT(n/b) + f(n): compare f(n) with n^(log_b a). If f(n) is smaller → T = O(n^log_b a). If equal → T = O(n^log_b a · log n). If f(n) is larger → T = O(f(n)).</div></div>`,

    `<div class="card"><div class="card-label">Merge sort mechanics</div><div class="card-text">Recursively split array in half until single elements (sorted by definition). Merge pairs back in sorted order using a temp array. Every element participates in O(log n) merge passes, each pass is O(n) → O(n log n) total.</div></div>
    <div class="code-block">mergeSort([5,2,4,1,3]):
  split → [5,2] and [4,1,3]
    split → [5] [2]   and   [4] [1,3]
                                split → [1] [3]
                                merge → [1,3]
              merge → [2,5]    merge → [1,3,4]
  merge → [1,2,3,4,5]</div>
    <div class="card"><div class="card-label">Quick sort mechanics</div><div class="card-text">Choose a pivot. Partition array so all elements &lt; pivot go left, all &gt; pivot go right. Pivot is in its final sorted position. Recurse on both sides. No merge step needed — partitioning does the work.</div></div>`,

    `<table class="complexity-table"><tr><th>Algorithm</th><th>Best</th><th>Average</th><th>Worst</th><th>Space</th><th>Stable?</th></tr>
    <tr><td>Merge Sort</td><td class="o-good">O(n log n)</td><td class="o-good">O(n log n)</td><td class="o-good">O(n log n)</td><td class="o-mid">O(n)</td><td>Yes</td></tr>
    <tr><td>Quick Sort</td><td class="o-good">O(n log n)</td><td class="o-good">O(n log n)</td><td class="o-bad">O(n²)</td><td class="o-good">O(log n)</td><td>No</td></tr>
    <tr><td>Binary Search</td><td class="o-good">O(1)</td><td class="o-good">O(log n)</td><td class="o-good">O(log n)</td><td class="o-good">O(1)</td><td>N/A</td></tr>
    </table>
    <div class="highlight" style="margin-top:12px"><strong>Quick sort worst case:</strong> occurs when pivot always lands at end (already sorted input + bad pivot choice). Fix: random pivot or median-of-3.</div>
    <div class="highlight"><strong>Master theorem applied:</strong> Merge sort T(n)=2T(n/2)+O(n). a=2, b=2, f(n)=n. n^log₂2 = n¹ = n = f(n). Equal → O(n log n). ✓</div>`,

    `<div class="pattern-card"><div class="pattern-name">Stable Merge Sort</div><div class="pattern-when">When order of equal elements matters. Java's Arrays.sort() for objects uses TimSort (merge-based) for this reason. Use when: sorting objects, external sort.</div></div>
    <div class="pattern-card"><div class="pattern-name">Quick Sort (in-place)</div><div class="pattern-when">O(log n) space. Cache-friendly. Faster in practice than merge sort despite same average complexity. Use when: in-memory sort, don't need stability.</div></div>
    <div class="pattern-card"><div class="pattern-name">Quick Select</div><div class="pattern-when">Find kth smallest element in O(n) average. Only recurse on ONE side after partitioning. Essential for "Kth Largest Element" problems.</div></div>
    <div class="pattern-card"><div class="pattern-name">Binary Search Variants</div><div class="pattern-when">D&C where only one half is explored. Leftmost/rightmost target, search in rotated array, search on answer space (binary search the answer).</div></div>`,

    `<div class="pattern-card"><div class="pattern-name">1. Split & Merge</div><div class="trigger">Mental trigger: "sorting, or combining independently-sorted halves"</div><div class="pattern-when">Merge sort template. Also: merge k sorted lists, sort linked list.</div></div>
    <div class="pattern-card"><div class="pattern-name">2. Partition Around Pivot</div><div class="trigger">Mental trigger: "find kth element / everything left of X, right of X"</div><div class="pattern-when">Quick sort, quick select, Dutch National Flag (3-way partition).</div></div>
    <div class="pattern-card"><div class="pattern-name">3. Binary Search on Answer</div><div class="trigger">Mental trigger: "find the minimum/maximum value satisfying a condition"</div><div class="pattern-when">Guess and check: binary search the answer space. E.g., min days to ship, capacity problem.</div></div>

    `<div class="code-block">// MERGE SORT
void mergeSort(int[] arr, int l, int r) {
    if (l >= r) return;                    // base case: single element
    int mid = l + (r - l) / 2;
    mergeSort(arr, l, mid);               // conquer left
    mergeSort(arr, mid+1, r);             // conquer right
    merge(arr, l, mid, r);                // combine
}

void merge(int[] arr, int l, int mid, int r) {
    int[] temp = new int[r - l + 1];
    int i = l, j = mid+1, k = 0;
    while (i &lt;= mid &amp;&amp; j &lt;= r)
        temp[k++] = arr[i] &lt;= arr[j] ? arr[i++] : arr[j++];
    while (i &lt;= mid) temp[k++] = arr[i++];
    while (j &lt;= r)   temp[k++] = arr[j++];
    for (int x = 0; x &lt; temp.length; x++) arr[l+x] = temp[x];
}

// QUICK SELECT — Kth Largest
int quickSelect(int[] nums, int l, int r, int k) {
    int pivot = nums[r], p = l;
    for (int i = l; i &lt; r; i++)
        if (nums[i] &lt;= pivot) swap(nums, i, p++);
    swap(nums, p, r);                     // pivot in final position
    if (p == k) return nums[p];
    return p &lt; k ? quickSelect(nums, p+1, r, k)
                  : quickSelect(nums, l, p-1, k);
}</div>`,

    <div class="code-block">// OPTIMAL: Quick Select — O(n) average
// Pattern: after partition, pivot is in its final sorted position.
// Only recurse on the side that contains index (n-k).
int findKthLargest(int[] nums, int k) {
    return quickSelect(nums, 0, nums.length-1, nums.length-k);
}
int quickSelect(int[] nums, int l, int r, int target) {
    int pivot = nums[r], p = l;
    for (int i = l; i &lt; r; i++)
        if (nums[i] &lt;= pivot) swap(nums, i, p++);
    swap(nums, p, r);
    if (p == target) return nums[p];
    return p &lt; target ? quickSelect(nums, p+1, r, target)
                       : quickSelect(nums, l, p-1, target);
}
// Why not sort? We only need ONE position, not the full order.

    `<div class="code-block">// THE UNIVERSAL BACKTRACKING TEMPLATE
void backtrack(State current, List&lt;State&gt; results, ...) {
    // BASE CASE: solution is complete
    if (isComplete(current)) {
        results.add(new ArrayList&lt;&gt;(current)); // copy! not reference
        return;
    }

    for (Choice c : getChoices(current)) {
        if (!isValid(current, c)) continue;  // PRUNE

        // CHOOSE
        current.add(c);
        markUsed(c);

        // EXPLORE
        backtrack(current, results, ...);

        // UNCHOOSE (state reset — critical!)
        current.remove(current.size()-1);
        markUnused(c);
    }
}

// CONCRETE: Subsets template
void subsets(int[] nums, int start, List&lt;Integer&gt; path,
             List&lt;List&lt;Integer&gt;&gt; res) {
    res.add(new ArrayList&lt;&gt;(path));  // every node is a valid subset
    for (int i = start; i &lt; nums.length; i++) {
        path.add(nums[i]);           // choose
        subsets(nums, i+1, path, res); // explore (i+1: no reuse)
        path.remove(path.size()-1);  // unchoose
    }
}</div>`,

    <div class="highlight"><strong>Brute force:</strong> iterate through all 2ⁿ bitmask combinations. Works but obscures the pattern.</div>
    <div class="code-block">// BACKTRACKING APPROACH — clean, extendable
List&lt;List&lt;Integer&gt;&gt; subsets(int[] nums) {
    List&lt;List&lt;Integer&gt;&gt; res = new ArrayList&lt;&gt;();
    backtrack(nums, 0, new ArrayList&lt;&gt;(), res);
    return res;
}
void backtrack(int[] nums, int start, List&lt;Integer&gt; path,
               List&lt;List&lt;Integer&gt;&gt; res) {
    res.add(new ArrayList&lt;&gt;(path)); // snapshot current path

    for (int i = start; i &lt; nums.length; i++) {
        path.add(nums[i]);          // CHOOSE: include nums[i]
        backtrack(nums, i+1, path, res); // EXPLORE: next elements
        path.remove(path.size()-1); // UNCHOOSE: remove nums[i]
    }
}
// Key insight: collect result at EVERY node, not just leaves.
// start index prevents backward selections (ensures no duplicates).</div>`,

    `<div class="code-block">// LC 46 — Permutations (unique elements, visited array)
List&lt;List&lt;Integer&gt;&gt; permute(int[] nums) {
    List&lt;List&lt;Integer&gt;&gt; res = new ArrayList&lt;&gt;();
    backtrack(nums, new boolean[nums.length], new ArrayList&lt;&gt;(), res);
    return res;
}
void backtrack(int[] nums, boolean[] visited, List&lt;Integer&gt; path,
               List&lt;List&lt;Integer&gt;&gt; res) {
    if (path.size() == nums.length) {
        res.add(new ArrayList&lt;&gt;(path)); // LEAF: complete permutation
        return;
    }
    for (int i = 0; i &lt; nums.length; i++) {
        if (visited[i]) continue;        // already in current path
        visited[i] = true;               // CHOOSE
        path.add(nums[i]);
        backtrack(nums, visited, path, res); // EXPLORE
        path.remove(path.size() - 1);   // UNCHOOSE
        visited[i] = false;
    }
}

// LC 47 — Permutations II (with duplicates)
void backtrack(int[] nums, boolean[] visited, List&lt;Integer&gt; path,
               List&lt;List&lt;Integer&gt;&gt; res) {
    if (path.size() == nums.length) { res.add(new ArrayList&lt;&gt;(path)); return; }
    for (int i = 0; i &lt; nums.length; i++) {
        if (visited[i]) continue;
        // Skip: same value AND previous sibling not yet used
        if (i > 0 &amp;&amp; nums[i] == nums[i-1] &amp;&amp; !visited[i-1]) continue;
        visited[i] = true;
        path.add(nums[i]);
        backtrack(nums, visited, path, res);
        path.remove(path.size()-1);
        visited[i] = false;
    }
}</div>`,

    `<div class="code-block">// LC 39 — Combination Sum (unlimited reuse)
List&lt;List&lt;Integer&gt;&gt; combinationSum(int[] candidates, int target) {
    List&lt;List&lt;Integer&gt;&gt; res = new ArrayList&lt;&gt;();
    Arrays.sort(candidates);           // optional: enables early break
    backtrack(candidates, target, 0, 0, new ArrayList&lt;&gt;(), res);
    return res;
}
void backtrack(int[] c, int target, int start, int sum,
               List&lt;Integer&gt; path, List&lt;List&lt;Integer&gt;&gt; res) {
    if (sum == target) { res.add(new ArrayList&lt;&gt;(path)); return; }
    for (int i = start; i &lt; c.length; i++) {
        if (sum + c[i] > target) break; // sorted → prune rest too
        path.add(c[i]);
        backtrack(c, target, i, sum + c[i], path, res); // i not i+1
        path.remove(path.size() - 1);
    }
}

// LC 17 — Phone Letter Combinations
String[] map = {"","","abc","def","ghi","jkl","mno","pqrs","tuv","wxyz"};
List&lt;String&gt; letterCombinations(String digits) {
    List&lt;String&gt; res = new ArrayList&lt;&gt;();
    if (digits.isEmpty()) return res;
    backtrack(digits, 0, new StringBuilder(), res);
    return res;
}
void backtrack(String digits, int index, StringBuilder sb,
               List&lt;String&gt; res) {
    if (index == digits.length()) { res.add(sb.toString()); return; }
    String letters = map[digits.charAt(index) - '0'];
    for (char c : letters.toCharArray()) {
        sb.append(c);                  // CHOOSE
        backtrack(digits, index + 1, sb, res); // EXPLORE
        sb.deleteCharAt(sb.length()-1); // UNCHOOSE
    }
}</div>`,

    `<div class="code-block">// LC 51 — N-Queens
List&lt;List&lt;String&gt;&gt; solveNQueens(int n) {
    List&lt;List&lt;String&gt;&gt; res = new ArrayList&lt;&gt;();
    char[][] board = new char[n][n];
    for (char[] row : board) Arrays.fill(row, '.');
    Set&lt;Integer&gt; cols = new HashSet&lt;&gt;();
    Set&lt;Integer&gt; diag = new HashSet&lt;&gt;();    // r - c
    Set&lt;Integer&gt; antiDiag = new HashSet&lt;&gt;(); // r + c
    backtrack(board, 0, n, cols, diag, antiDiag, res);
    return res;
}

void backtrack(char[][] board, int row, int n,
               Set&lt;Integer&gt; cols, Set&lt;Integer&gt; diag,
               Set&lt;Integer&gt; antiDiag, List&lt;List&lt;String&gt;&gt; res) {
    if (row == n) {               // all rows placed
        List&lt;String&gt; solution = new ArrayList&lt;&gt;();
        for (char[] r : board) solution.add(new String(r));
        res.add(solution);
        return;
    }
    for (int col = 0; col &lt; n; col++) {
        // PRUNE: check all 3 constraints in O(1)
        if (cols.contains(col) || diag.contains(row - col)
                || antiDiag.contains(row + col)) continue;

        // CHOOSE: place queen
        board[row][col] = 'Q';
        cols.add(col);
        diag.add(row - col);
        antiDiag.add(row + col);

        backtrack(board, row + 1, n, cols, diag, antiDiag, res);

        // UNCHOOSE: remove queen
        board[row][col] = '.';
        cols.remove(col);
        diag.remove(row - col);
        antiDiag.remove(row + col);
    }
}</div>`,

    `<div class="code-block">// LC 37 — Sudoku Solver
boolean[][] rows = new boolean[9][10];
boolean[][] cols = new boolean[9][10];
boolean[][] boxes = new boolean[9][10];

void solveSudoku(char[][] board) {
    // Initialize constraint arrays from given digits
    for (int r = 0; r &lt; 9; r++)
        for (int c = 0; c &lt; 9; c++)
            if (board[r][c] != '.') {
                int d = board[r][c] - '0';
                int b = (r/3)*3 + (c/3);
                rows[r][d] = cols[c][d] = boxes[b][d] = true;
            }
    backtrack(board, 0, 0);
}

boolean backtrack(char[][] board, int r, int c) {
    // Advance to next cell
    if (c == 9) { r++; c = 0; }
    if (r == 9) return true;              // all cells filled → solved!
    if (board[r][c] != '.') return backtrack(board, r, c+1);

    int b = (r/3)*3 + (c/3);
    for (int d = 1; d &lt;= 9; d++) {
        if (rows[r][d] || cols[c][d] || boxes[b][d]) continue; // PRUNE

        // CHOOSE: place digit d
        board[r][c] = (char)('0' + d);
        rows[r][d] = cols[c][d] = boxes[b][d] = true;

        // EXPLORE: move to next cell
        if (backtrack(board, r, c+1)) return true; // propagate success!

        // UNCHOOSE: remove digit d
        board[r][c] = '.';
        rows[r][d] = cols[c][d] = boxes[b][d] = false;
    }
    return false;                         // no valid digit → backtrack
}

// LC 36 — Valid Sudoku (just validate, no solving)
boolean isValidSudoku(char[][] board) {
    boolean[][] rows = new boolean[9][10];
    boolean[][] cols = new boolean[9][10];
    boolean[][] boxes = new boolean[9][10];
    for (int r = 0; r &lt; 9; r++)
        for (int c = 0; c &lt; 9; c++) {
            if (board[r][c] == '.') continue;
            int d = board[r][c] - '0';
            int b = (r/3)*3 + (c/3);
            if (rows[r][d] || cols[c][d] || boxes[b][d]) return false;
            rows[r][d] = cols[c][d] = boxes[b][d] = true;
        }
    return true;
}</div>`,

let currentTopic = 0;
let currentSection = 0;

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = TABS.map((t,i) => `<button class="tab ${i===currentSection?'active':''}" onclick="selectSection(${i})">${t}</button>`).join('');
}

function renderContent() {
  const topic = DATA[currentTopic];
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="topic-header">
      <div class="topic-title">${topic.title}</div>
      <div class="topic-subtitle">${topic.subtitle}</div>
    </div>
    ${topic.sections[currentSection] || '<div class="card"><div class="card-text">Content coming soon.</div></div>'}
  `;
}

function selectTopic(idx) {
  currentTopic = idx;
  currentSection = 0;
  document.querySelectorAll('.topic-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderTabs();
  renderContent();
  document.getElementById('main').scrollTop = 0;
}

function selectSection(idx) {
  currentSection = idx;
  renderTabs();
  renderContent();
  document.getElementById('main').scrollTop = 0;
}

renderTabs();
renderContent();
