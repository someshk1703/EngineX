<script>
const TABS=["Definition","Mechanics","Complexity","Variants","Patterns","Smell→Pattern","Java Code","Worked Example","Practice","Interview"];

const D=[
{title:"DP Fundamentals",sub:"Overlapping subproblems · Optimal substructure · Memo vs tabulation",s:[
`<div class="card"><div class="lbl">What it is</div><div class="ct">Dynamic Programming solves problems by breaking them into overlapping subproblems, solving each subproblem once, and storing results to avoid recomputation. DP applies when the problem has two properties: <strong>overlapping subproblems</strong> (same sub-calculation appears many times) and <strong>optimal substructure</strong> (optimal solution built from optimal solutions of subproblems).</div></div>
<div class="hl"><strong>DP = recursion + memoization.</strong> Or equivalently: DP = smart brute force that never recomputes the same thing twice.</div>
<div class="card"><div class="lbl">DP vs D&C vs Greedy</div><div class="ct"><strong>D&C</strong>: subproblems are independent (merge sort). <strong>DP</strong>: subproblems overlap (fibonacci). <strong>Greedy</strong>: local optimal = global optimal (always pick largest coin). DP is the most general — it explores all possibilities but caches results.</div></div>`,

`<div class="card"><div class="lbl">Two formulations</div><div class="ct"><strong>Top-down (memoization):</strong> Write recursive solution naturally. Add a cache (HashMap or array). Before computing, check cache. After computing, store in cache. Natural to write, lazy evaluation.<br><br><strong>Bottom-up (tabulation):</strong> Fill a DP table from smallest subproblems to largest. No recursion, no stack overhead. Often more space-efficient (can discard old rows). Harder to see the state transition initially.</div></div>
<div class="code">// TOP-DOWN (memoization)
Map&lt;Integer,Integer&gt; memo = new HashMap&lt;&gt;();
int fib(int n) {
    if (n &lt;= 1) return n;
    if (memo.containsKey(n)) return memo.get(n); // cache hit
    int res = fib(n-1) + fib(n-2);
    memo.put(n, res);                            // cache store
    return res;
}

// BOTTOM-UP (tabulation)
int fib(int n) {
    if (n &lt;= 1) return n;
    int[] dp = new int[n+1];
    dp[0]=0; dp[1]=1;
    for (int i=2; i&lt;=n; i++)
        dp[i] = dp[i-1] + dp[i-2];    // fill from small → large
    return dp[n];
}

// SPACE-OPTIMIZED bottom-up (only need prev 2)
int fib(int n) {
    if (n &lt;= 1) return n;
    int a=0, b=1;
    for (int i=2; i&lt;=n; i++) { int c=a+b; a=b; b=c; }
    return b;
}</div>`,

`<table class="ctbl"><tr><th>Approach</th><th>Time</th><th>Space</th><th>Notes</th></tr>
<tr><td>Naive recursion</td><td class="ob">O(2ⁿ)</td><td class="og">O(n)</td><td>Recomputes same subproblems exponentially</td></tr>
<tr><td>Top-down memo</td><td class="og">O(n·k)</td><td class="om">O(n·k)</td><td>n = states, k = work per state; cache overhead</td></tr>
<tr><td>Bottom-up table</td><td class="og">O(n·k)</td><td class="om">O(n·k)</td><td>No stack, fill order matters</td></tr>
<tr><td>Space-optimized</td><td class="og">O(n·k)</td><td class="og">O(k)</td><td>Discard rows no longer needed</td></tr>
</table>
<div class="hl" style="margin-top:10px"><strong>State count is key.</strong> Time = (number of unique states) × (work per state). If you have n items and capacity W, states = n×W, work = O(1) → O(nW) total. This framework applies to every DP problem.</div>`,

`<div class="pc"><div class="pn">Linear DP (1D)</div><div class="pw">dp[i] depends on dp[i-1], dp[i-2], or a window of previous states. Climbing stairs, house robber, coin change.</div></div>
<div class="pc"><div class="pn">Grid DP (2D)</div><div class="pw">dp[i][j] depends on dp[i-1][j], dp[i][j-1], dp[i-1][j-1]. Unique paths, edit distance, LCS.</div></div>
<div class="pc"><div class="pn">Interval DP</div><div class="pw">dp[i][j] = optimal answer for subarray/substring [i..j]. Build from short intervals to long. Burst balloons, matrix chain.</div></div>
<div class="pc"><div class="pn">Knapsack DP</div><div class="pw">0/1 knapsack, unbounded knapsack, partition. Classic "include/exclude" decision at each item.</div></div>
<div class="pc"><div class="pn">Bitmask DP</div><div class="pw">State = bitmask of which elements are included/visited. Exponential states but each in O(1). TSP, assignment problems.</div></div>
<div class="pc"><div class="pn">Tree DP</div><div class="pw">dp defined on tree nodes. Result for a node depends on results of its children. Post-order traversal.</div></div>`,

`<div class="pc"><div class="pn">1. Identify the state</div><div class="trig">Mental trigger: "what information do I need at each step?"</div><div class="pw">State = minimum info needed to describe a subproblem uniquely. Wrong state = wrong DP. E.g., for coin change: state = remaining amount. For knapsack: state = (item index, remaining capacity).</div></div>
<div class="pc"><div class="pn">2. Write the recurrence</div><div class="trig">Mental trigger: "how does dp[i] relate to smaller states?"</div><div class="pw">The recurrence IS the algorithm. Express dp[i] in terms of dp[i-1], dp[i-2], dp[i][j-1] etc. This is the hardest step — write it on paper first.</div></div>
<div class="pc"><div class="pn">3. Identify base cases</div><div class="trig">Mental trigger: "what's the smallest subproblem I can answer directly?"</div><div class="pw">Base cases anchor the recurrence. Wrong base case = wrong answer. dp[0], dp[1], dp[i][0], dp[0][j] are common.</div></div>
<div class="pc"><div class="pn">4. Determine fill order</div><div class="trig">Mental trigger: "when I compute dp[i], are all its dependencies already computed?"</div><div class="pw">For bottom-up: ensure you fill dependencies before dependents. Typically left→right, top→bottom, or diagonal for interval DP.</div></div>`,

`<div class="card"><div class="lbl">Problem smell → pattern map</div>
<div class="sr"><span class="si">IF</span><span class="sth">"how many ways to do X"</span><span class="sw">→ Counting DP — sum over choices</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">"minimum/maximum cost/steps"</span><span class="sw">→ Optimization DP — min/max over choices</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">recursive solution recomputes same args</span><span class="sw">→ Add memoization (top-down DP)</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">overlapping subproblems + optimal substructure</span><span class="sw">→ DP over greedy or backtracking</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">choosing from a sequence with future consequences</span><span class="sw">→ DP — decision at each step, build table</span></div>
</div>`,

`<div class="code">// DP PROBLEM-SOLVING FRAMEWORK (apply every time)
//
// STEP 1: Define state
//   dp[i] = answer for subproblem of size i
//   dp[i][j] = answer considering first i items with constraint j
//
// STEP 2: Write recurrence
//   dp[i] = f(dp[i-1], dp[i-2], ...)  ← define the transition
//
// STEP 3: Base cases
//   dp[0] = ?, dp[1] = ?  ← smallest answerable subproblem
//
// STEP 4: Fill order + answer
//   for i from small to large: fill dp[i]
//   return dp[n] or dp[n][W] etc.
//
// STEP 5: Space optimization (if needed)
//   If dp[i] only depends on dp[i-1], use two variables.
//   If 2D dp[i][j] only depends on current+prev row, use 1D.

// TEMPLATE: top-down
int solve(int n, int[] memo) {
    if (n == BASE) return BASE_VALUE;
    if (memo[n] != -1) return memo[n];
    return memo[n] = Math.min(
        solve(n-1, memo) + ...,
        solve(n-2, memo) + ...
    );
}

// TEMPLATE: bottom-up
int[] dp = new int[n+1];
dp[0] = BASE_VALUE_0;
dp[1] = BASE_VALUE_1;
for (int i = 2; i &lt;= n; i++)
    dp[i] = Math.min(dp[i-1] + ..., dp[i-2] + ...);</div>`,

`<div class="card"><div class="lbl">LC 70 — Climbing Stairs (DP fundamentals demo)</div><div class="ct">How many distinct ways to climb n stairs if you can take 1 or 2 steps?</div></div>
<div class="hl"><strong>Brute force:</strong> backtracking — try 1 step and 2 step at each position. O(2ⁿ). Recomputes stairs(3) in many branches.</div>
<div class="code">// DP approach:
// State: dp[i] = ways to reach stair i
// Recurrence: dp[i] = dp[i-1] + dp[i-2]
//   (arrived from stair i-1 via 1 step, OR from i-2 via 2 steps)
// Base: dp[1]=1, dp[2]=2

int climbStairs(int n) {
    if (n &lt;= 2) return n;
    int prev2 = 1, prev1 = 2;
    for (int i = 3; i &lt;= n; i++) {
        int curr = prev1 + prev2;  // recurrence
        prev2 = prev1;
        prev1 = curr;
    }
    return prev1;
}
// Identical to Fibonacci! dp[i] only needs prev 2 → O(1) space.</div>`,

`<div class="prb"><div class="diff easy">Easy</div><div class="pname">LC 70 — Climbing Stairs</div><div class="pmeta"><strong>Why:</strong> Canonical DP intro. Fibonacci recurrence in disguise.<br><strong>Key insight:</strong> At each stair, you came from i-1 or i-2 → sum of both.</div></div>
<div class="prb"><div class="diff easy">Easy</div><div class="pname">LC 509 — Fibonacci Number</div><div class="pmeta"><strong>Why:</strong> Teaches memo vs tabulation vs space-optimized on same problem.<br><strong>Key insight:</strong> Same recurrence, three implementations to compare.</div></div>
<div class="prb"><div class="diff medium">Medium</div><div class="pname">LC 322 — Coin Change</div><div class="pmeta"><strong>Why:</strong> Classic optimization DP. Forces clear state/recurrence thinking.<br><strong>Key insight:</strong> dp[i] = min coins for amount i. Try each coin.</div></div>
<div class="prb"><div class="diff medium">Medium</div><div class="pname">LC 198 — House Robber</div><div class="pmeta"><strong>Why:</strong> Include/exclude decision at each element.<br><strong>Key insight:</strong> dp[i] = max(dp[i-1], dp[i-2] + nums[i]).</div></div>
<div class="prb"><div class="diff hard">Hard</div><div class="pname">LC 10 — Regular Expression Matching</div><div class="pmeta"><strong>Why:</strong> 2D DP with complex state transitions. Tests DP mastery.<br><strong>Key insight:</strong> dp[i][j] = does s[0..i-1] match p[0..j-1]?</div></div>`,

`<div class="card"><div class="lbl">What interviewers test</div>
<div class="ipill"><span class="dot"></span><span>Can you articulate the state definition clearly before coding?</span></div>
<div class="ipill"><span class="dot"></span><span>Do you write the recurrence on paper/whiteboard before the loop?</span></div>
<div class="ipill"><span class="dot"></span><span>Can you convert top-down to bottom-up?</span></div>
<div class="ipill"><span class="dot"></span><span>Do you mention space optimization when applicable?</span></div>
</div>
<div class="hl"><strong>Think-aloud template:</strong> "I see overlapping subproblems here. Let me define dp[i] as [X]. The recurrence is dp[i] = [f(smaller states)] because [reason]. Base case is dp[0] = [Y]. I'll fill left to right. Time O([Z]), space O([Z]) — or O(1) if I only keep the last two values."</div>`
]},

{title:"1D DP",sub:"Climbing stairs · House robber · Coin change · Decode ways",s:[
`<div class="card"><div class="lbl">What it is</div><div class="ct">1D DP uses a single array (or two variables) where dp[i] represents the answer for a subproblem of size i. The recurrence relates dp[i] to a fixed number of previous entries. Core problems: climbing stairs, house robber, coin change, decode ways. All share the same template — state is one index, transition looks back 1, 2, or k steps.</div></div>
<div class="hl">1D DP recognition: "answer for the first i elements" or "answer for amount i" — single parameter defines the state completely.</div>
<div class="card"><div class="lbl">Four canonical problems</div><div class="ct"><strong>Climbing Stairs:</strong> dp[i] = dp[i-1] + dp[i-2]. Count ways.<br><strong>House Robber:</strong> dp[i] = max(dp[i-1], dp[i-2]+nums[i]). Can't take adjacent.<br><strong>Coin Change:</strong> dp[i] = min(dp[i-coin]+1) for each coin. Min coins for amount i.<br><strong>Decode Ways:</strong> dp[i] = ways to decode s[0..i-1]. Depends on single vs double digit validity.</div></div>`,

`<div class="card"><div class="lbl">House Robber decision tree</div></div>
<div class="code">nums = [2, 7, 9, 3, 1]
dp[0] = 2   (take house 0)
dp[1] = 7   (max(2,7) — take house 1 alone)
dp[2] = 11  (max(dp[1], dp[0]+9) = max(7,11))
dp[3] = 11  (max(dp[2], dp[1]+3) = max(11,10))
dp[4] = 12  (max(dp[3], dp[2]+1) = max(11,12))
Answer: 12 (houses 0,2,4: 2+9+1=12)</div>
<div class="card"><div class="lbl">Coin Change BFS analogy</div><div class="ct">Think of dp[amount] as shortest path from 0 to amount where each coin is an edge of that weight. BFS would work too but DP is cleaner. dp[0]=0 (base). For each amount i, try each coin c: dp[i] = min(dp[i], dp[i-c]+1).</div></div>
<div class="card"><div class="lbl">Decode Ways state</div><div class="ct">dp[i] = number of ways to decode s[0..i-1]. Two transitions: (1) single digit s[i-1] valid (1-9) → dp[i] += dp[i-1]. (2) double digit s[i-2..i-1] valid (10-26) → dp[i] += dp[i-2]. Edge case: '0' digit — not valid alone, only valid if preceded by 1 or 2.</div></div>`,

`<table class="ctbl"><tr><th>Problem</th><th>State</th><th>Time</th><th>Space</th></tr>
<tr><td>Climbing Stairs</td><td>dp[i] = ways to reach i</td><td class="og">O(n)</td><td class="og">O(1)</td></tr>
<tr><td>House Robber</td><td>dp[i] = max rob first i houses</td><td class="og">O(n)</td><td class="og">O(1)</td></tr>
<tr><td>Coin Change</td><td>dp[i] = min coins for amount i</td><td class="og">O(n·m)</td><td class="og">O(n)</td></tr>
<tr><td>Decode Ways</td><td>dp[i] = ways to decode s[0..i-1]</td><td class="og">O(n)</td><td class="og">O(1)</td></tr>
<tr><td>House Robber II (circle)</td><td>Two runs: exclude first or last</td><td class="og">O(n)</td><td class="og">O(1)</td></tr>
</table>`,

`<div class="pc"><div class="pn">Linear scan — look back 1 or 2</div><div class="pw">Climbing stairs, house robber. dp[i] depends on dp[i-1] and/or dp[i-2]. Space-optimize to O(1) using two variables.</div></div>
<div class="pc"><div class="pn">Unbounded choices per state</div><div class="pw">Coin change. For each dp[i], iterate all coins. dp[i] = min/sum over all valid coins. Inner loop over choices, outer loop over states.</div></div>
<div class="pc"><div class="pn">Conditional transitions</div><div class="pw">Decode ways. Transition is valid only if a condition holds (digit in range, character valid). Always check validity before adding to dp[i].</div></div>
<div class="pc"><div class="pn">Circular constraint</div><div class="pw">House Robber II. Can't rob first and last. Run robber twice: once on nums[0..n-2], once on nums[1..n-1]. Answer = max of both runs.</div></div>`,

`<div class="pc"><div class="pn">1. "Can't take adjacent" pattern</div><div class="trig">Mental trigger: "skip or take, but no two in a row"</div><div class="pw">dp[i] = max(dp[i-1], dp[i-2] + val[i]). Core house robber logic. Extends to: delete-and-earn, jump game variants.</div></div>
<div class="pc"><div class="pn">2. "Min cost to reach amount" pattern</div><div class="trig">Mental trigger: "min coins/steps to reach target from choices"</div><div class="pw">dp[amount] = min over all choices c of dp[amount-c]+1. Init dp[0]=0, all others to INF. Check dp[i-c] != INF before using.</div></div>
<div class="pc"><div class="pn">3. "Count distinct ways" pattern</div><div class="trig">Mental trigger: "how many ways to reach state i"</div><div class="pw">dp[i] += dp[i-step] for each valid step. Climbing stairs, decode ways, coin change II (count, not min). Be careful: += not = .</div></div>`,

`<div class="card"><div class="lbl">Problem smell → pattern map</div>
<div class="sr"><span class="si">IF</span><span class="sth">"no two adjacent elements"</span><span class="sw">→ House Robber: dp[i]=max(dp[i-1], dp[i-2]+val[i])</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">"min coins/steps to reach amount"</span><span class="sw">→ Coin Change: dp[i]=min(dp[i-c]+1) for each coin c</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">"count ways to decode/split string"</span><span class="sw">→ Decode Ways: check 1-digit and 2-digit validity</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">"circular array, can't use both ends"</span><span class="sw">→ House Robber II: two passes, take max</span></div>
<div class="sr"><span class="si">IF</span><span class="sth">"ways to make change (count, not min)"</span><span class="sw">→ Coin Change II: dp[i] += dp[i-coin] (order matters for outer/inner loop)</span></div>
</div>`,

`<div class="code">// LC 198 — House Robber
int rob(int[] nums) {
    int n = nums.length;
    if (n == 1) return nums[0];
    int prev2 = nums[0], prev1 = Math.max(nums[0], nums[1]);
    for (int i = 2; i &lt; n; i++) {
        int curr = Math.max(prev1, prev2 + nums[i]);
        prev2 = prev1;
        prev1 = curr;
    }
    return prev1;
}

// LC 322 — Coin Change
int coinChange(int[] coins, int amount) {
    int[] dp = new int[amount + 1];
    Arrays.fill(dp, amount + 1);   // "infinity"
    dp[0] = 0;
    for (int i = 1; i &lt;= amount; i++)
        for (int c : coins)
            if (c &lt;= i)
                dp[i] = Math.min(dp[i], dp[i - c] + 1);
    return dp[amount] &gt; amount ? -1 : dp[amount];
}

// LC 91 — Decode Ways
int numDecodings(String s) {
    int n = s.length();
    int prev2 = 1, prev1 = s.charAt(0) == '0' ? 0 : 1;
    for (int i = 2; i &lt;= n; i++) {
        int curr = 0;
        int oneDigit  = Integer.parseInt(s.substring(i-1, i));
        int twoDigits = Integer.parseInt(s.substring(i-2, i));
        if (oneDigit &gt;= 1) curr += prev1;    // valid single digit
        if (twoDigits &gt;= 10 &amp;&amp; twoDigits &lt;= 26) curr += prev2; // valid pair
        prev2 = prev1; prev1 = curr;
    }
    return prev1;
}</div>`,
