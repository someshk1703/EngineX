    {
      label: "Why it exists",
      body: `<p>Before OSI (1984), networking stacks were proprietary — IBM's SNA couldn't talk to DEC's DECnet. The ISO created OSI to give vendors a common language and clear contract between layers: each layer only talks to the one directly above and below it.</p><p>TCP/IP predates OSI and doesn't map perfectly to it, but OSI remains the universal vocabulary for diagnosing network problems and designing protocols.</p>`

<div class="layer-row"><div class="layer-num">6</div><div class="layer-box" style="background:#E1F5EE;color:#085041"><div class="layer-name">Presentation</div><div class="layer-protos">TLS/SSL, JPEG, MIME, ASCII</div><div class="layer-unit">Data</div></div></div>

<div class="layer-row"><div class="layer-num">4</div><div class="layer-box" style="background:#FAEEDA;color:#633806"><div class="layer-name">Transport</div><div class="layer-protos">TCP, UDP, SCTP</div><div class="layer-unit">Segment</div></div></div>

<div class="layer-row"><div class="layer-num">2</div><div class="layer-box" style="background:#FBEAF0;color:#72243E"><div class="layer-name">Data Link</div><div class="layer-protos">Ethernet, Wi-Fi (802.11), ARP</div><div class="layer-unit">Frame</div></div></div>
<div class="layer-row"><div class="layer-num">1</div><div class="layer-box" style="background:#F1EFE8;color:#444441"><div class="layer-name">Physical</div><div class="layer-protos">Ethernet cable, fibre, radio, USB</div><div class="layer-unit">Bit</div></div></div>

      body: `<p>Sending side (top-down): each layer wraps the data from the layer above by prepending (and sometimes appending) its own header. Layer 4 adds a TCP header → Layer 3 adds an IP header → Layer 2 adds an Ethernet frame header + trailer → Layer 1 converts to bits on the wire.</p>
<p>Receiving side (bottom-up): each layer strips its header and passes the payload up. This is called <strong>de-encapsulation</strong>.</p>
<p>Key consequence: a router operates at Layer 3 only — it reads the IP header, makes a routing decision, then re-frames at Layer 2. A switch operates at Layer 2. A load balancer can operate at L4 (TCP) or L7 (HTTP).</p>`

<li><strong>TCP 3-way handshake</strong> — SYN → SYN-ACK → ACK to port 443 on Google's IP</li>
<li><strong>TLS handshake</strong> — certificate exchange, key agreement, session keys negotiated</li>
<li><strong>HTTP GET /</strong> — encrypted HTTP request sent over the established TLS+TCP connection</li>
<li><strong>Response</strong> — Google's server returns HTML, browser begins parsing, fires sub-requests for CSS/JS/images (more DNS + TCP + TLS per new origin)</li>

</ol>`

// 1 — TCP vs UDP
{
  tag: "Transport Layer",
  title: "TCP vs UDP",
  oneliner: "TCP is a reliable, ordered, connection-oriented protocol; UDP is an unreliable, connectionless protocol — you choose based on whether you need delivery guarantees or raw speed.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>IP alone delivers packets on a best-effort basis — packets can be lost, duplicated, reordered, or corrupted. Applications need different contracts: a file transfer needs every byte correct; a live video call needs low latency and can tolerate dropped frames. TCP and UDP represent the two ends of that spectrum.</p>`
    },
    {
      label: "TCP — how it works",
      body: `<p><strong>3-way handshake (connection establishment):</strong></p>
<ol class="step-list">
<li>Client sends SYN (seq=x) — "I want to connect, starting sequence x"</li>
<li>Server replies SYN-ACK (seq=y, ack=x+1) — "OK, my sequence is y, I got your x"</li>
<li>Client sends ACK (ack=y+1) — "Got it, connection open"</li>
</ol>
<p style="margin-top:10px"><strong>4-way termination:</strong> FIN → ACK → FIN → ACK. The half-close (FIN) allows one side to stop sending while still receiving. TIME_WAIT state holds the connection 2×MSL (~60s) to handle delayed packets.</p>
<p><strong>Reliability mechanisms:</strong></p>
<ul style="list-style:disc;padding-left:18px;font-size:14px;line-height:1.8">
<li>Sequence numbers — detect reordering, enable reassembly</li>
<li>Acknowledgements + retransmission timeout (RTO) — lost segments are resent</li>
<li>Checksum — detects corruption</li>
</ul>`
    },
    {
      label: "Flow control & congestion control",
      body: `<p><strong>Flow control</strong> prevents a fast sender from overwhelming a slow receiver. The receiver advertises a <em>receive window</em> (rwnd) in every ACK — the sender can have at most rwnd unacknowledged bytes in flight.</p>
<p><strong>Congestion control</strong> prevents the sender from overwhelming the network. TCP maintains a <em>congestion window</em> (cwnd):</p>
<ol class="step-list">
<li><strong>Slow start</strong> — cwnd starts at 1 MSS, doubles every RTT until ssthresh</li>
<li><strong>Congestion avoidance</strong> — above ssthresh, cwnd grows by 1 MSS per RTT (linear)</li>
<li><strong>Fast retransmit</strong> — 3 duplicate ACKs → packet lost → retransmit immediately</li>
<li><strong>Fast recovery</strong> (TCP Reno) — halve cwnd instead of resetting to 1</li>
</ol>
<p>Modern variants: TCP Cubic (default Linux), TCP BBR (Google — models bandwidth+RTT, not just loss).</p>`
    },
    {
      label: "UDP — how it works",
      body: `<p>UDP header is 8 bytes: source port, destination port, length, checksum. That's it. No handshake, no sequence numbers, no ACK, no retransmission. The application is fully responsible for any reliability it needs.</p>
<p><strong>When to use UDP:</strong> DNS queries, video streaming, VoIP, online games, DHCP, QUIC (which builds its own reliability on top). The key insight: UDP is the right base when you need to control exactly how reliability works, or when you can tolerate loss.</p>`
    },
    {
      label: "Comparison",
      body: `
<div class="subtopic-card"><div class="subtopic-name">TCP</div><div class="subtopic-desc">Connection-oriented, reliable, ordered, flow-controlled, congestion-controlled. Higher overhead (20-byte header min). Use for: HTTP, SSH, FTP, databases, anything where correctness matters.</div></div>
<div class="subtopic-card"><div class="subtopic-name">UDP</div><div class="subtopic-desc">Connectionless, unreliable, unordered, no flow/congestion control. 8-byte header. Use for: DNS, video/audio streaming, gaming, QUIC, multicast, broadcast.</div></div>
`
    },
    {
      label: "Code — TCP handshake in pseudocode",

socket = new TCPSocket()
socket.connect("142.250.80.46", 443)      // triggers SYN
// OS handles SYN-ACK receipt → sends ACK
// connection.state = ESTABLISHED

socket.send("GET / HTTP/1.1\\r\\nHost: google.com\\r\\n\\r\\n")
response = socket.recv(4096)

// Termination
socket.close()   // sends FIN; waits for FIN from server → TIME_WAIT</div>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">TCP is a phone call — you dial, they pick up (handshake), you both speak and confirm you heard each other, and you say goodbye before hanging up. UDP is shouting across a crowded room — you send it, you don't know if they heard it, and there's no "did you get that?"</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"UDP is always faster than TCP"</strong> — On an uncongested LAN, TCP adds ~microseconds. The real cost is latency on loss. UDP wins when you control retransmission logic (like QUIC).</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"TCP prevents all packet loss"</strong> — TCP detects and retransmits, but this adds latency. It doesn't magically prevent the network from dropping packets.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"3-way handshake creates the connection"</strong> — It synchronises sequence numbers and confirms both parties are ready. The OS allocates state (socket buffer, TCB) which is why SYN floods are an attack vector.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">Why does TCP use a 3-way handshake and not 2?</div><div class="a">Two-way can't confirm the server's ISN (initial sequence number) was received. The third ACK (from client) proves the server's SYN-ACK was received — both sides have confirmed their sequence numbers.</div></div>
<div class="interview-q"><div class="q">What is the TIME_WAIT state and why does it exist?</div><div class="a">After sending the final ACK, the client waits 2×MSL before closing. If the server didn't receive that ACK, it will re-send its FIN — TIME_WAIT ensures we can reply. It also prevents old delayed packets from polluting a new connection on the same 4-tuple.</div></div>
<div class="interview-q"><div class="q">How does TCP handle a slow receiver?</div><div class="a">Receive window (rwnd) in every ACK. Sender can have at most min(cwnd, rwnd) bytes in flight.</div></div>
`
    },
    {
      label: "Connects to",

Borrow 2 bits → /26 (4 subnets, each 64 addresses, 62 usable)

Subnet 1: 10.0.0.0   – 10.0.0.63    /26  (network: .0,  broadcast: .63)
Subnet 2: 10.0.0.64  – 10.0.0.127   /26  (network: .64, broadcast: .127)
Subnet 3: 10.0.0.128 – 10.0.0.191   /26

<p style="margin-top:12px"><strong>NAT (Network Address Translation):</strong> your home router has one public IP. All devices behind it share it. When you make a request, the router records {private_ip:port → public_ip:port} in a NAT table, replaces the source address with the public IP, and reverses the translation on response. This is why you can't easily receive incoming connections behind NAT (server problem for P2P — solved by STUN/TURN/hole-punching in WebRTC).</p>`

// 3 — DNS

<div class="subtopic-card"><div class="subtopic-name">Iterative (from resolver's perspective)</div><div class="subtopic-desc">The resolver itself iterates: asks root → gets referral → asks TLD → gets referral → asks authoritative → gets answer. Each server gives a referral, not the final answer. This is how the recursive resolver works internally.</div></div>

// 5 — HTTP/2
{
  tag: "Application Protocol",
  title: "HTTP/2",
  oneliner: "HTTP/2 is a binary, multiplexed protocol that sends multiple requests and responses concurrently over a single TCP connection, eliminating HTTP/1.1's head-of-line blocking at the HTTP layer.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>HTTP/1.1 had three main performance problems: HOL blocking, redundant headers on every request (headers not compressed), and the inability to push resources proactively. Browsers hacked around this with 6 parallel connections per origin — wasteful and complex. HTTP/2 (2015, derived from Google's SPDY) solved all three architecturally.</p>`
    },
    {
      label: "Multiplexing — the core innovation",
      body: `<p>HTTP/2 introduces the concept of <strong>streams</strong> — independent, bidirectional sequences of frames within a single TCP connection. Each request gets a stream ID (odd for client-initiated: 1, 3, 5...). Frames from different streams are interleaved on the wire and reassembled at the receiver.</p>
<div class="code-block">Single TCP connection:
Stream 1: [GET /index.html ]→  ←[ 200 HTML      ]
Stream 3: [GET /style.css  ]→  ←[ 200 CSS       ]
Stream 5: [GET /app.js     ]→  ←[ 200 JS        ]
                    ↑ all concurrent, no waiting</div>
<p>Result: eliminates HTTP-level HOL blocking. Important: TCP-level HOL blocking still exists in HTTP/2 — a dropped TCP packet stalls all streams. This is why HTTP/3 moved to UDP.</p>`
    },
    {
      label: "Header compression — HPACK",
      body: `<p>HTTP/1.1 sends full headers with every request (cookies, User-Agent etc. can be kilobytes). HPACK maintains a shared static table (61 common header/value pairs pre-defined) and a dynamic table (headers seen this session). After the first request, recurring headers are sent as 1-byte indices instead of full strings.</p>
<p>Example: <code>:method GET</code> → 1 byte (index 2 in static table). Savings of 80-90% on header size after the first request.</p>`
    },
    {
      label: "Server Push",
      body: `<div class="subtopic-card"><div class="subtopic-name">Server Push</div><div class="subtopic-desc">Server can proactively send resources the client will need before it asks. When you request index.html, the server can push style.css and app.js immediately. In practice: underused and often harmful (server can't know browser cache state). HTTP/2 push is deprecated in Chrome and most CDNs. Early Hints (103 status) is the replacement.</div></div>`
    },
    {
      label: "Stream prioritisation",
      body: `<p>Clients can assign weights (1–256) and dependencies to streams. A browser might prioritise the HTML stream over images. In practice, most servers implement this partially or poorly — it's one of HTTP/2's underdelivered promises.</p>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">HTTP/1.1 is a single-lane road — one car at a time per lane, and you need 6 parallel roads (connections) to get throughput. HTTP/2 is a highway with HOV lanes — all cars share one road, each labelled with a stream ID, and they merge at the destination. TCP HOL blocking means if there's an accident on the highway (packet loss), all cars stop — HTTP/3 puts each car on its own track (UDP streams).</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"HTTP/2 fully solves HOL blocking"</strong> — Only at the HTTP layer. TCP-level HOL blocking remains. One lost TCP segment blocks all streams. This is the key motivation for HTTP/3/QUIC.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"HTTP/2 requires HTTPS"</strong> — The spec allows cleartext (h2c), but every major browser only implements HTTP/2 over TLS. In practice: yes, HTTPS required.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"Domain sharding is still needed"</strong> — Domain sharding (multiple subdomains to bypass 6-connection limit) is actually harmful with HTTP/2. It creates multiple connections, defeating multiplexing.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">How does HTTP/2 multiplexing differ from HTTP/1.1 pipelining?</div><div class="a">Pipelining sends requests in order, responses must come in the same order — server-side HOL blocking remains. Multiplexing uses independent streams; responses can arrive in any order, interleaved at frame level. Completely different mechanism.</div></div>
<div class="interview-q"><div class="q">What problem does HTTP/2 NOT solve that HTTP/3 does?</div><div class="a">TCP-level HOL blocking. HTTP/2 streams over TCP — one lost packet stalls all streams. HTTP/3 uses QUIC over UDP, where each stream is independent even at the transport level.</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">HTTP/1.1 (replaces)</span><span class="connect-pill">HTTP/3 / QUIC (next evolution)</span><span class="connect-pill">TLS (required in practice)</span><span class="connect-pill">gRPC (uses HTTP/2)</span><span class="connect-pill">CDN (HTTP/2 support)</span>
</div>`
    }
  ]
},

// 6 — HTTP/3 / QUIC
{
  tag: "Application Protocol",
  title: "HTTP/3 / QUIC",
  oneliner: "HTTP/3 runs over QUIC — a UDP-based transport that builds reliability, multiplexing, and TLS 1.3 into the protocol itself, eliminating TCP's head-of-line blocking and handshake latency.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>HTTP/2's multiplexing is great, but it's built on TCP. TCP is a single byte stream — one lost packet stalls the whole connection until it's retransmitted. On a 1% packet loss network, HTTP/2 can be worse than HTTP/1.1. QUIC (developed by Google, standardised RFC 9000) rebuilds the transport layer on UDP to get independent streams, faster handshakes, and connection migration.</p>`
    },
    {
      label: "QUIC — how it works",
      body: `<p>QUIC is implemented in userspace (not the OS kernel like TCP). This means it can be iterated faster and customised per application. It builds on UDP but adds:</p>
<ol class="step-list">
<li><strong>Independent streams</strong> — each QUIC stream is independently flow-controlled. A lost packet in stream 1 does not block stream 3. True multiplexing without HOL blocking.</li>
<li><strong>Integrated TLS 1.3</strong> — QUIC handshake combines transport + TLS in one round trip. No separate TCP handshake then TLS handshake.</li>
<li><strong>Connection IDs</strong> — QUIC connections are identified by a connection ID, not the 4-tuple (src-ip:port, dst-ip:port) like TCP. Switching from Wi-Fi to 4G doesn't break the connection — the connection ID persists.</li>
<li><strong>0-RTT resumption</strong> — if you've connected before, QUIC can send data in the very first packet (0-RTT) using a pre-shared session ticket. First-time connections are 1-RTT.</li>
</ol>`
    },
    {
      label: "0-RTT vs 1-RTT",
      body: `<div class="code-block">TCP + TLS 1.2:  SYN → SYN-ACK → ACK → TLS(2 RTT) = 3 RTT before data
TCP + TLS 1.3:  SYN → SYN-ACK → ACK → TLS(1 RTT) = 2 RTT before data
QUIC 1-RTT:     QUIC Initial → QUIC Handshake → data = 1 RTT
QUIC 0-RTT:     QUIC Initial + data (using cached session ticket) = 0 RTT

Note: 0-RTT is vulnerable to replay attacks — only safe for idempotent requests</div>`
    },
    {
      label: "Connection migration",
      body: `<p>On TCP, if your IP changes (phone moves from Wi-Fi to LTE), the 4-tuple changes, the connection breaks, and you start over. QUIC's connection ID is opaque to the network — the server identifies you by it, not by your IP. The connection migrates transparently. Critical for mobile users and long-lived connections (video calls, file downloads).</p>`
    },
    {
      label: "HOL blocking — the fix",
      body: `<div class="subtopic-card"><div class="subtopic-name">TCP HOL blocking (HTTP/2 problem)</div><div class="subtopic-desc">TCP is a single ordered byte stream. Packet loss triggers retransmit and all data after the gap waits, including data from unrelated HTTP/2 streams. Affects all streams equally.</div></div>
<div class="subtopic-card"><div class="subtopic-name">QUIC streams (HTTP/3 fix)</div><div class="subtopic-desc">Each QUIC stream is independently ordered. A lost packet only stalls the stream it belongs to. Other streams continue flowing. HOL blocking is eliminated at the transport level.</div></div>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">TCP is like a conveyor belt — all items must stay in order, so if one item falls off, the whole belt stops. QUIC is like separate delivery trucks, one per stream — if one truck has a flat tyre, the others keep driving. And QUIC's connection ID means if a truck changes its number plate (IP), the warehouse still knows which driver it is.</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"QUIC is unreliable because it uses UDP"</strong> — QUIC implements its own reliability, ordering, and congestion control on top of UDP. It's more reliable than TCP in lossy conditions because HOL blocking doesn't cascade.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"0-RTT is always safe"</strong> — 0-RTT data can be replayed by an attacker. Only use it for idempotent operations (GET, HEAD). POST with 0-RTT is a security risk.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"HTTP/3 is only for mobile"</strong> — It benefits any lossy or high-latency network. Google serves ~25% of its traffic over QUIC. Cloudflare, Fastly, and AWS all support it.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">Why did HTTP/3 switch from TCP to UDP?</div><div class="a">TCP's HOL blocking meant one lost packet stalls all HTTP/2 streams. By building on UDP, QUIC can implement its own per-stream ordering — packet loss only affects the stream it belongs to. Also: faster handshake (1-RTT vs 2), connection migration via connection IDs, and faster iteration (userspace vs kernel).</div></div>
<div class="interview-q"><div class="q">What is 0-RTT and what's the security trade-off?</div><div class="a">0-RTT reuses a pre-shared session ticket from a previous connection to send data with the first packet. Trade-off: replay attacks — an adversary can resend the 0-RTT packet to trigger the same server action. Only safe for idempotent requests.</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">HTTP/2 (predecessor)</span><span class="connect-pill">TCP vs UDP</span><span class="connect-pill">TLS 1.3 (integrated)</span><span class="connect-pill">WebRTC (also QUIC-influenced)</span><span class="connect-pill">CDN (QUIC at edge)</span>
</div>`
    }
  ]
},

// 7 — WebSocket
{
  tag: "Application Protocol",
  title: "WebSocket",
  oneliner: "WebSocket is a full-duplex, persistent communication protocol over a single TCP connection, enabling the server to push data to clients without the client polling.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>HTTP is fundamentally request/response — the client always initiates. For real-time apps (chat, live scores, collaborative editing, stock prices), you need the server to push updates. Polling (repeated HTTP requests) wastes bandwidth. Long-polling (hold a request open) is hacky. WebSocket provides a proper bidirectional channel.</p>`
    },
    {
      label: "Upgrade handshake",
      body: `<div class="code-block">// Client HTTP request (upgrade)
GET /chat HTTP/1.1
Host: example.com
Upgrade: websocket
Connection: Upgrade
Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==   ← base64 random 16 bytes
Sec-WebSocket-Version: 13

// Server response (101 Switching Protocols)
HTTP/1.1 101 Switching Protocols
Upgrade: websocket
Connection: Upgrade
Sec-WebSocket-Accept: s3pPLMBiTxaQ9kYGzzhZRbK+xOo=  ← SHA1(key + magic GUID)

// Connection is now full-duplex WebSocket. HTTP is gone.</div>`
    },
    {
      label: "Frames",
      body: `<p>After the handshake, data is exchanged as frames — binary envelopes with: FIN bit (is this the last frame?), opcode (text=1, binary=2, close=8, ping=9, pong=10), masking (client→server frames must be masked with a 4-byte key), payload length.</p>
<p>Messages can be fragmented across multiple frames. The application reassembles them using the FIN bit.</p>`
    },
    {
      label: "Heartbeat (ping/pong)",
      body: `<p>TCP connections can be silently dropped by NAT devices or firewalls after inactivity. WebSocket heartbeats use opcode 9 (ping) / opcode 10 (pong): server sends ping, client must reply with pong. If no pong within a timeout, connection is considered dead and closed. Keeps NAT mappings alive and detects dead connections.</p>`
    },
    {
      label: "vs SSE vs Long-polling",
      body: `
<div class="subtopic-card"><div class="subtopic-name">Long-polling</div><div class="subtopic-desc">Client sends a request; server holds it open until data is available, then responds. Client immediately opens another request. Simulates push over HTTP. Works everywhere but wasteful — new TCP connection each cycle, high latency tail.</div></div>
<div class="subtopic-card"><div class="subtopic-name">Server-Sent Events (SSE)</div><div class="subtopic-desc">HTTP/1.1 streaming: server sends text/event-stream; client reads indefinitely. One-directional (server→client only). Simple, uses regular HTTP (works with CDNs, proxies). Ideal for live dashboards, notifications. Auto-reconnects on drop.</div></div>
<div class="subtopic-card"><div class="subtopic-name">WebSocket</div><div class="subtopic-desc">Full-duplex. Both sides send anytime. Custom framing protocol. Requires stateful server (sticky sessions or pub/sub backend). Use for: chat, multiplayer games, collaborative editing, trading terminals.</div></div>
`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">HTTP is like sending letters — you always write first, the server replies, done. Long-polling is like calling a restaurant and staying on hold until your table is ready. SSE is a radio broadcast — station (server) talks, you listen. WebSocket is a phone call — both people can speak and listen simultaneously, anytime.</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"WebSocket is always better than SSE"</strong> — If you only need server→client push (notifications, live feeds), SSE is simpler, HTTP-native, auto-reconnects, works with standard proxies. WebSocket is overkill.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"WebSocket is stateless"</strong> — WebSocket maintains persistent state (connection object, session, subscriptions). Horizontal scaling requires shared state (Redis pub/sub) or sticky sessions.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">How would you design a chat system — WebSocket, SSE, or long-polling?</div><div class="a">WebSocket: full-duplex needed (user sends and receives). Scale with Redis pub/sub (each server subscribes to user channels). Long-polling as degraded fallback. Mention: sticky sessions or connection IDs for routing.</div></div>
<div class="interview-q"><div class="q">What happens when a WebSocket server is behind a load balancer?</div><div class="a">WebSocket connections are long-lived and stateful — the LB must route a client's reconnect to the same server (sticky sessions/consistent hashing) OR the app must externalise state (Redis, Kafka) so any server can handle any connection.</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">HTTP/1.1 (upgrade from)</span><span class="connect-pill">TCP (underlying)</span><span class="connect-pill">Redis pub/sub (scaling)</span><span class="connect-pill">Load Balancers (sticky sessions)</span><span class="connect-pill">Zombie Hunt project</span>
</div>`
    }
  ]
},

// 8 — TLS/HTTPS
{
  tag: "Security Protocol",
  title: "TLS / HTTPS",
  oneliner: "TLS is a cryptographic protocol that provides authentication, confidentiality, and integrity for data in transit by combining asymmetric key exchange with symmetric encryption.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>HTTP sends everything in plaintext. Anyone on the network path (ISP, coffee shop Wi-Fi, rogue router) can read or modify data. TLS (Transport Layer Security, successor to SSL) solves three problems: prove the server is who it claims to be (authentication), ensure nobody can read the data (confidentiality), ensure nobody tampered with it (integrity).</p>`
    },
    {
      label: "TLS 1.3 handshake — step by step",
      body: `<ol class="step-list">
<li><strong>ClientHello</strong> — client sends: TLS version, random nonce, list of supported cipher suites, key share (public key for ECDHE)</li>
<li><strong>ServerHello</strong> — server picks cipher suite, sends its key share, session ticket if resuming. Both sides now compute the shared secret (ECDHE). All subsequent messages encrypted.</li>
<li><strong>Server Certificate + Verify</strong> — server sends its X.509 cert chain, proves ownership via digital signature with private key. Client verifies cert chain up to a trusted CA.</li>
<li><strong>Server Finished</strong> — MAC over the entire handshake transcript</li>
<li><strong>Client Finished</strong> — MAC over transcript. Both sides now have symmetric session keys. Data flows.</li>
</ol>
<p><strong>Total: 1 RTT</strong> (vs 2 RTT in TLS 1.2). With 0-RTT resumption: 0 RTT.</p>`
    },
    {
      label: "Asymmetric vs symmetric",
      body: `
<div class="subtopic-card"><div class="subtopic-name">Asymmetric (RSA, ECDHE) — key exchange only</div><div class="subtopic-desc">Public key encrypts, private key decrypts. Or: private key signs, public key verifies. Slow — used ONLY to establish a shared secret and verify identity. Never used for bulk data encryption.</div></div>
<div class="subtopic-card"><div class="subtopic-name">Symmetric (AES-256-GCM) — actual data encryption</div><div class="subtopic-desc">Same key encrypts and decrypts. Fast (hardware-accelerated on modern CPUs). Used for all application data after handshake. The session key is ephemeral — derived during handshake, discarded after session.</div></div>
`
    },
    {
      label: "Certificate chain & CA",
      body: `<div class="code-block">Browser trusts ~150 Root CAs (pre-installed in OS/browser)

Certificate chain:
  Root CA (self-signed, offline, very secure)
    └── Intermediate CA (signed by Root CA)
          └── End-entity cert: google.com (signed by Intermediate CA)

Verification: browser verifies each signature up the chain.
If any cert is expired, revoked, or chain is broken → TLS alert → connection aborted.

Revocation:
  CRL (Certificate Revocation List) — download a list; stale
  OCSP (Online Certificate Status Protocol) — real-time check; privacy concern
  OCSP Stapling — server fetches OCSP response, staples it to TLS handshake</div>`
    },
    {
      label: "HSTS",
      body: `<p>HTTP Strict Transport Security: server sends <code>Strict-Transport-Security: max-age=31536000; includeSubDomains</code>. Browser stores this: for the next year, always connect over HTTPS, never HTTP — even if user types http://. Prevents SSL stripping attacks. Chrome/Firefox maintain an HSTS preload list (hardcoded sites that are always HTTPS).</p>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">TLS is like a diplomatic handshake followed by a secret language. Before talking, both sides prove their identity (passport check via CA). They agree on a secret codebook (session keys via ECDHE — even if eavesdropped, the shared secret can't be computed without private keys). Then they speak in code (AES). If someone tampers with a message, the MAC detects it immediately. HSTS is like having a standing rule: "I only meet this diplomat in secure rooms, always."</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"HTTPS means the site is safe"</strong> — HTTPS means the connection is encrypted. The site itself can still be malicious. The padlock = encrypted channel, not trustworthy content.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"RSA is used to encrypt data"</strong> — RSA (or ECDHE) is only used during key exchange/authentication. Actual data uses AES — orders of magnitude faster.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"TLS 1.2 and 1.3 are similar"</strong> — TLS 1.3 dropped support for weak cipher suites (RC4, 3DES, RSA key exchange without forward secrecy), reduced handshake to 1-RTT, and mandates ephemeral keys (forward secrecy). TLS 1.2 is the minimum acceptable today; 1.0/1.1 are deprecated.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">Explain the TLS handshake at a high level.</div><div class="a">ClientHello (cipher suites, key share) → ServerHello (choice + key share) → both compute shared secret via ECDHE → server sends cert + proof of ownership → Finished messages confirm handshake integrity. 1-RTT total in TLS 1.3. Then symmetric AES for data.</div></div>
<div class="interview-q"><div class="q">What is forward secrecy and why does TLS 1.3 require it?</div><div class="a">Forward secrecy means if the server's long-term private key is compromised, past sessions can't be decrypted — because each session used an ephemeral key pair discarded after the session. TLS 1.3 mandates ECDHE (ephemeral), eliminating RSA key exchange which had no forward secrecy.</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">HTTP/2 (requires TLS)</span><span class="connect-pill">HTTP/3 (TLS 1.3 integrated in QUIC)</span><span class="connect-pill">JWT / OAuth2 (Java topic)</span><span class="connect-pill">Cryptography (CS Fundamentals)</span><span class="connect-pill">CDN (TLS termination at edge)</span>
</div>`
    }
  ]
},

// 9 — REST
{
  tag: "API Design",
  title: "REST Principles",
  oneliner: "REST is an architectural style for distributed hypermedia systems defined by six constraints — statelessness, uniform interface, and resource-based URLs being the three you'll use every day.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>Roy Fielding defined REST in his 2000 PhD dissertation as a set of architectural constraints that, when applied to web services, produce scalable, decoupled, and evolvable systems. REST isn't a protocol or a standard — it's a design philosophy that maps naturally to HTTP.</p>`
    },
    {
      label: "The 6 constraints",
      body: `
<div class="subtopic-card"><div class="subtopic-name">1. Client-Server</div><div class="subtopic-desc">Separation of concerns. UI/client handles presentation, server handles data. They evolve independently.</div></div>
<div class="subtopic-card"><div class="subtopic-name">2. Stateless</div><div class="subtopic-desc">Every request contains all information needed to process it. No server-side session state. Session state lives on the client (JWT, cookies). Enables horizontal scaling — any server can handle any request.</div></div>
<div class="subtopic-card"><div class="subtopic-name">3. Cacheable</div><div class="subtopic-desc">Responses must declare themselves cacheable or not (Cache-Control headers). Enables CDN and client-side caching, reduces server load.</div></div>
<div class="subtopic-card"><div class="subtopic-name">4. Uniform Interface</div><div class="subtopic-desc">Resources identified by URI. Manipulated through representations (JSON/XML). Self-descriptive messages (Content-Type, status codes). HATEOAS (links in response).</div></div>
<div class="subtopic-card"><div class="subtopic-name">5. Layered System</div><div class="subtopic-desc">Client doesn't know if it's talking to origin server or a load balancer/CDN/proxy. Enables independent deployment of intermediaries.</div></div>
<div class="subtopic-card"><div class="subtopic-name">6. Code on Demand (optional)</div><div class="subtopic-desc">Server can extend client functionality by sending executable code (JavaScript). The only optional constraint.</div></div>
`
    },
    {
      label: "Resource design & HTTP method mapping",
      body: `<div class="code-block">// Resource-based (nouns, not verbs)
GET    /users          → list users
POST   /users          → create user
GET    /users/123      → get user 123
PUT    /users/123      → replace user 123
PATCH  /users/123      → update fields on user 123
DELETE /users/123      → delete user 123

GET    /users/123/orders      → user's orders (nested resource)
POST   /users/123/orders      → create order for user 123

// Anti-patterns (RPC style, not RESTful)
POST /getUser          ✗
POST /createUser       ✗
GET  /deleteUser/123   ✗</div>`
    },
    {
      label: "HATEOAS",
      body: `<p>Hypermedia As The Engine Of Application State: responses include links to related actions, so clients don't need to hardcode URLs. In practice, most "REST" APIs don't implement HATEOAS. Fielding considers them not truly RESTful. In interviews, know what it is but note it's rarely used.</p>
<div class="code-block">// HATEOAS response
{ "id": 123, "name": "Somesh",
  "_links": {
    "self": { "href": "/users/123" },
    "orders": { "href": "/users/123/orders" },
    "delete": { "href": "/users/123", "method": "DELETE" }
  }
}</div>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">REST treats the web like a filing cabinet. Every drawer (resource) has an address (/users/123). You use standard tools to interact: pull out (GET), add to (POST), replace (PUT), update a field (PATCH), throw away (DELETE). The cabinet doesn't remember who you are between visits (stateless) — you always show your ID (token) with each request.</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"Any JSON API over HTTP is REST"</strong> — REST requires statelessness, uniform interface, and proper HTTP semantics. Most "REST" APIs are actually just HTTP+JSON RPC.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"REST is always better than gRPC"</strong> — REST is better for public APIs, human-readable debugging, and browser-native use. gRPC is better for internal service-to-service calls, streaming, and performance-critical paths.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">What makes an API RESTful? Name the key constraints.</div><div class="a">Stateless (every request self-contained), uniform interface (resource URLs, HTTP verbs, standard status codes), cacheable, client-server separation, layered system. HATEOAS technically required but rarely implemented.</div></div>
<div class="interview-q"><div class="q">When would you choose gRPC over REST?</div><div class="a">Internal microservices needing high throughput (Protobuf is 3-10x smaller than JSON), bidirectional streaming, strongly-typed contracts, polyglot teams. REST for public APIs, browser clients, simpler CRUD.</div></div>
`

</div>`

// 10 — gRPC
{
  tag: "RPC Framework",
  title: "gRPC",
  oneliner: "gRPC is a high-performance RPC framework from Google that uses Protocol Buffers for serialisation and HTTP/2 for transport, enabling strongly-typed, efficient service-to-service communication.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>REST+JSON is human-friendly but inefficient: JSON is verbose, lacks a schema, requires parsing, and doesn't support streaming natively. For internal microservices making thousands of calls per second, Google needed something faster, smaller, and contract-first. gRPC (2015) is what they built and open-sourced.</p>`
    },
    {
      label: "Protocol Buffers (Protobuf)",
      body: `<p>Protobuf is gRPC's IDL (interface definition language) and binary serialisation format. You define messages and services in a .proto file; the protoc compiler generates type-safe client and server stubs in any language.</p>
<div class="code-block">// user.proto
syntax = "proto3";

message User {
  int32 id = 1;          // field number, not value
  string name = 2;
  string email = 3;
}

service UserService {
  rpc GetUser(UserRequest) returns (User);
  rpc ListUsers(Empty) returns (stream User);      // server streaming
  rpc CreateUsers(stream User) returns (Summary);  // client streaming
  rpc Chat(stream Message) returns (stream Message); // bidirectional
}

// Binary: User{id:1, name:"Somesh"} = ~10 bytes vs JSON ~30 bytes</div>`
    },
    {
      label: "4 streaming types",
      body: `
<div class="subtopic-card"><div class="subtopic-name">Unary</div><div class="subtopic-desc">One request, one response. Equivalent to a REST call. Most common.</div></div>
<div class="subtopic-card"><div class="subtopic-name">Server streaming</div><div class="subtopic-desc">Client sends one request, server streams multiple responses. Use case: subscribe to live stock prices, large dataset export.</div></div>
<div class="subtopic-card"><div class="subtopic-name">Client streaming</div><div class="subtopic-desc">Client streams multiple requests, server sends one response. Use case: upload a large file in chunks, batch insert.</div></div>
<div class="subtopic-card"><div class="subtopic-name">Bidirectional streaming</div><div class="subtopic-desc">Both sides stream simultaneously. Use case: chat applications, real-time collaborative features, gaming. Runs over a single HTTP/2 stream.</div></div>
`
    },
    {
      label: "gRPC vs REST comparison",
      body: `<div class="code-block">                gRPC                    REST
Transport:      HTTP/2                  HTTP/1.1 or HTTP/2
Payload:        Binary (Protobuf)       Text (JSON/XML)
Schema:         Strict (.proto file)    Optional (OpenAPI)
Streaming:      4 types built-in        Workarounds only
Browser support:Limited (grpc-web)      Full native
Performance:    ~10x faster             Slower
Learning curve: Higher (proto + codegen) Lower
Use case:       Internal microservices  Public APIs, browser</div>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">REST is a public post office: anyone can send a letter, addresses are human-readable, any format accepted. gRPC is a private pneumatic tube system inside a skyscraper — blazing fast, binary messages, both sides must agree on the tube diameter (proto schema), but it doesn't work outside the building (limited browser support).</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"gRPC is always faster"</strong> — For small payloads and low-frequency calls, the overhead of Protobuf encoding can exceed savings. gRPC wins at high throughput and large payloads.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"gRPC works in browsers"</strong> — Not natively. Browsers can't control HTTP/2 framing. grpc-web is a workaround using a proxy (Envoy). WebSockets are usually better for browser bidirectional needs.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">When would you choose gRPC over REST for a microservices system?</div><div class="a">Internal service calls with high throughput, need for streaming (logs, events), polyglot teams benefiting from auto-generated stubs, or when you want contract-first API design with compile-time type safety.</div></div>
<div class="interview-q"><div class="q">What is Protobuf and why is it more efficient than JSON?</div><div class="a">Binary serialisation with a schema. Fields are identified by numbers, not strings — saves space. No quotes, no field name repetition, fixed-width encoding for numbers. Typically 3-10x smaller and 5-10x faster to parse than equivalent JSON.</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">HTTP/2 (gRPC transport)</span><span class="connect-pill">REST (comparison)</span><span class="connect-pill">Microservices (System Design)</span><span class="connect-pill">Protocol design</span>
</div>`
    }
  ]
},

// 11 — CDN
{
  tag: "Infrastructure",
  title: "CDN — Content Delivery Network",
  oneliner: "A CDN is a globally distributed network of edge servers that cache and serve content from locations physically close to users, reducing latency and offloading traffic from origin servers.",
  sections: [
    {
      label: "Why it exists",
      body: `<p>Physics: light travels ~200,000 km/s in fibre. A request from Mumbai to a server in Virginia adds ~150ms of latency, minimum, just for the round trip. CDNs solve this by caching content at Points of Presence (PoPs) worldwide — a Mumbai user hits a PoP in Mumbai, not Virginia.</p>`
    },
    {
      label: "How it works",
      body: `<ol class="step-list">
<li><strong>DNS-based routing</strong>: your domain's CNAME points to the CDN (e.g., example.com CNAME → example.com.cloudfront.net). CDN's DNS returns the IP of the nearest PoP using anycast or GeoDNS.</li>
<li><strong>Cache hit</strong>: PoP has the asset → serves immediately from edge (e.g., 5ms round-trip from same city)</li>
<li><strong>Cache miss</strong>: PoP forwards request to origin server, caches the response, serves it. Subsequent requests to that PoP hit cache.</li>
<li><strong>Cache-Control</strong>: origin response headers (max-age, s-maxage, Vary) tell the CDN how long to cache and under what conditions to vary the cached copy.</li>
</ol>`
    },
    {
      label: "Anycast routing",
      body: `<p>Multiple PoPs advertise the same IP address via BGP. The internet's routing protocols automatically route traffic to the topologically nearest PoP. If a PoP goes down, traffic automatically fails over to the next nearest. Cloudflare uses anycast for all its PoPs — 100+ locations all reachable via the same IP.</p>`
    },
    {
      label: "Cache-Control headers",
      body: `<div class="code-block">Cache-Control: public, max-age=86400          // cache 1 day, anywhere
Cache-Control: private, max-age=3600          // browser only, not CDN
Cache-Control: s-maxage=3600                  // CDN-specific TTL (overrides max-age for CDN)
Cache-Control: no-cache                       // must revalidate (304 check)
Cache-Control: no-store                       // never cache (sensitive data)
Cache-Control: stale-while-revalidate=60      // serve stale for 60s while refreshing
Surrogate-Key: product-123 user-456           // Fastly: tag-based purging</div>`
    },
    {
      label: "Origin shield",
      body: `<p>Without an origin shield: a CDN with 100 PoPs might have 100 concurrent cache misses for a new/expired asset, sending 100 simultaneous requests to your origin (thundering herd). Origin shield designates one central PoP as the "shield" — all other PoPs fetch from the shield instead of origin, collapsing 100 requests to 1.</p>`
    },
    {
      label: "Cache purging",
      body: `<p>When you deploy new code/content, old CDN-cached versions must be invalidated. Methods: URL-based purge (purge specific paths), wildcard purge, tag-based purge (Fastly surrogate keys — tag all assets for product-123, purge by tag on update), cache versioning (embed hash in filename: app.a3f2c1.js — old URLs simply expire naturally).</p>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">CDN is like a franchise restaurant chain. The head office (origin) has the master recipe. Each city has its own franchise (PoP) with pre-made dishes (cached content). You order locally — fast. If your city doesn't have that dish, the franchise calls head office, gets the recipe, and now serves it locally too. Purging is head office calling all franchises: "the recipe changed, throw out the old stock."</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"CDNs are only for static assets"</strong> — Modern CDNs (Cloudflare Workers, Lambda@Edge, Fastly Compute) run custom code at the edge. Dynamic personalisation, A/B testing, auth checks — all at the edge.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"Cache-Control: no-cache means don't cache"</strong> — It means "cache it, but validate with origin before using" (conditional GET). Use no-store to truly prevent caching.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">How would you design a CDN for YouTube videos?</div><div class="a">PoPs in major metros via anycast. Large objects (video chunks) cached by popularity + recency. Cache-Control: s-maxage=86400. Origin shield to prevent thundering herd on viral videos. Separate CDN tiers for hot/warm/cold content. Purge on video deletion/update.</div></div>
<div class="interview-q"><div class="q">What is a cache stampede and how does a CDN prevent it?</div><div class="a">When a cached item expires, many simultaneous requests reach origin before the first response is cached. Solutions: origin shield (collapses to 1 origin request), stale-while-revalidate (serve stale while fetching fresh), request coalescing (CDN deduplicates concurrent misses).</div></div>
`
    },
    {
      label: "Connects to",
      body: `<div class="connects-grid">
<span class="connect-pill">DNS (CNAME to CDN)</span><span class="connect-pill">HTTP/1.1 (cache headers)</span><span class="connect-pill">TLS (termination at edge)</span><span class="connect-pill">Caching strategies (System Design)</span><span class="connect-pill">URL shortener design</span>
</div>`
    }
  ]
},

// 12 — Proxies
{
  tag: "Network Infrastructure",
  title: "Proxies",

  sections: [
    {
      label: "Why it exists",

    {
      label: "Forward proxy",
      body: `<div class="subtopic-card"><div class="subtopic-name">Forward proxy</div><div class="subtopic-desc">Sits in front of clients. Client configures it explicitly (browser proxy settings) or it's transparent. Client → Forward Proxy → Internet. Uses: corporate internet filtering (block social media), anonymity (Tor is a chain of proxies), bypassing geo-restrictions, caching in offices. The server sees the proxy's IP, not the client's IP.</div></div>`

      label: "Reverse proxy as load balancer",

upstream backend {
    least_conn;                    // routing algorithm
    server 10.0.0.1:8080;
    server 10.0.0.2:8080;
    server 10.0.0.3:8080;
}

server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/cert.pem;   // TLS termination here

    location / {
        proxy_pass http://backend;             // forward to upstream (HTTP internally)
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }
}</div>`
    },
    {
      label: "Mental model",
      body: `<div class="analogy-box">Forward proxy: a personal assistant who calls restaurants on your behalf — the restaurant knows the assistant's number, not yours. Reverse proxy: a hotel concierge — guests interact with the concierge, who routes to the right department (restaurant, spa, housekeeping). Guests don't know (or care) which specific staff member handles it. SOCKS5: a universal phone extension that patches through any type of call, regardless of language spoken.</div>`
    },
    {
      label: "Common misconceptions",
      body: `
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"VPN and proxy are the same"</strong> — A VPN encrypts all traffic at OS level and creates a virtual network interface. A proxy is application-level (configured per app/browser). VPNs are more comprehensive but heavier. SOCKS5 proxy can be lighter-weight for specific use cases.</div></div>
<div class="misconception"><span class="icon">✕</span><div class="text"><strong>"Reverse proxy is just a load balancer"</strong> — Load balancing is one function. Reverse proxies also do: SSL termination, compression, caching, authentication, WAF, rate limiting, A/B routing, canary deployments. Nginx/Envoy as reverse proxy is a full traffic management layer.</div></div>
`
    },
    {
      label: "Interview perspective",
      body: `
<div class="interview-q"><div class="q">What's the difference between a forward and reverse proxy?</div><div class="a">Forward proxy represents clients (client-side). Clients configure it; servers don't know clients' real IPs. Reverse proxy represents servers (server-side). Clients don't know it exists; it routes to backend servers. Nginx in production is almost always a reverse proxy.</div></div>
<div class="interview-q"><div class="q">Where does SSL termination happen in a typical production setup?</div><div class="a">At the reverse proxy (Nginx / AWS ALB). It terminates TLS, then forwards plaintext HTTP to backend services on the internal network. This offloads crypto computation from app servers and centralises certificate management. Internal traffic over VPC is considered trusted.</div></div>
`

function show(idx, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render(idx);
}

function render(idx) {
  const t = topics[idx];
  let html = `
    <div class="topic-header">
      <span class="topic-tag">${t.tag}</span>
      <div class="topic-title">${t.title}</div>
      <div class="topic-oneliner">${t.oneliner}</div>
    </div>
  `;
  for (const s of t.sections) {
    html += `
      <div class="section">
        <div class="section-label">${s.label}</div>
        <div class="section-body">${s.body}</div>
      </div>
    `;
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').scrollTop = 0;
}

render(0);
</script>
